    };

    // ─── YearlyGameplan ──────────────────────────────────────────────────────────
    // ─── Yearly Gameplan ─────────────────────────────────────────────────────
    const YearlyGameplan = ({ lawnProfile, weather, onNavigate }) => {
        const [activeTab, setActiveTab] = useState('upcoming');
        const currentMonthIdx = new Date().getMonth();
        const currentMonth = MONTH_NAMES[currentMonthIdx];

        if (!lawnProfile || !lawnProfile.specificGrass || !lawnProfile.zone) {
            return (
                <div className="space-y-4 animate-fade-in">
                    <h2 className="text-2xl font-bold">📅 Lawn Care Program</h2>
                    <div className="bg-amber-50 border border-amber-200 rounded-xl p-5 text-center">
                        <div className="text-3xl mb-2">🌱</div>
                        <div className="font-bold text-gray-800 mb-1">Set Up Your Lawn Profile First</div>
                        <div className="text-sm text-gray-500 mb-4">We need your grass type and zone to build a personalized yearly plan.</div>
                        <button onClick={() => onNavigate('profile')} className="px-6 py-3 bg-[#367C2B] text-white rounded-xl font-bold">
                            Set Up My Lawn →
                        </button>
                    </div>
                </div>
            );
        }

        const programKey = GRASS_KEY_MAP[lawnProfile.specificGrass] + '_zone' + getParentZone(lawnProfile.zone);
        const program = typeof grassPrograms !== 'undefined' ? grassPrograms[programKey] : null;
        const grassInfo = GRASS_INFO[lawnProfile.specificGrass];

        // Filter out mowing and watering tasks — gameplan focuses on scheduled treatments
        const isGameplanTask = (task) => {
            const lower = task.toLowerCase();
            return !/\bmow(ing)?\b|\bcut (height|grass)\b|mow (weekly|at|every)|watering|irrigat|water (as needed|deeply|1|0\.|per week)|\bdrip\b/.test(lower);
        };

        // Assign a type and color to each task for visual grouping
        const getTaskMeta = (task) => {
            const lower = task.toLowerCase();
            if (/pre-emergent|pre emergent|crabgrass prev|prodiamine|dithiopyr/.test(lower))
                return { icon: '🛡️', label: 'Pre-Emergent', color: 'bg-amber-100 text-amber-800 border-amber-300' };
            if (/overseed|reseed|sow/.test(lower))
                return { icon: '🌱', label: 'Seeding', color: 'bg-yellow-100 text-yellow-800 border-yellow-300' };
            if (/fertili|feeding|\blb n\b|nitrogen|winterizer/.test(lower))
                return { icon: '🌾', label: 'Fertilizer', color: 'bg-green-100 text-green-800 border-green-300' };
            if (/aerat/.test(lower))
                return { icon: '🔧', label: 'Aeration', color: 'bg-purple-100 text-purple-800 border-purple-300' };
            if (/dethatch|scalp|thatch/.test(lower))
                return { icon: '✂️', label: 'Dethatch/Scalp', color: 'bg-stone-100 text-stone-700 border-stone-300' };
            if (/soil test|lime|ph|potassium|\biron\b/.test(lower))
                return { icon: '🧪', label: 'Soil Care', color: 'bg-orange-100 text-orange-800 border-orange-300' };
            if (/herbicide|weed|post-emergent|broadleaf/.test(lower))
                return { icon: '🌿', label: 'Weed Control', color: 'bg-red-100 text-red-800 border-red-300' };
            if (/fungicide|disease|patch|rust|blight|chinch/.test(lower))
                return { icon: '💊', label: 'Disease/Pest', color: 'bg-pink-100 text-pink-800 border-pink-300' };
            if (/ryegrass|overseed.*rye|winter color/.test(lower))
                return { icon: '🌾', label: 'Winter Overseed', color: 'bg-teal-100 text-teal-800 border-teal-300' };
            return { icon: '📋', label: 'General', color: 'bg-gray-100 text-gray-700 border-gray-300' };
        };

        const isCurrentMonthEntry = (monthStr) => {
            if (monthStr === currentMonth) return true;
            if (monthStr && monthStr.includes('-')) {
                const parts = monthStr.split('-');
                const s = MONTH_NAMES.indexOf(parts[0].trim()), e = MONTH_NAMES.indexOf(parts[1].trim());
                if (s >= 0 && e >= 0 && currentMonthIdx >= s && currentMonthIdx <= e) return true;
            }
            return false;
        };

        const monthIndexForEntry = (monthStr) => {
            if (!monthStr) return -1;
            const direct = MONTH_NAMES.indexOf(monthStr);
            if (direct >= 0) return direct;
            if (monthStr.includes('-')) {
                const s = MONTH_NAMES.indexOf(monthStr.split('-')[0].trim());
                return s >= 0 ? s : -1;
            }
            return -1;
        };

        if (!program) {
            return (
                <div className="space-y-4 animate-fade-in">
                    <h2 className="text-2xl font-bold">📅 Lawn Care Program</h2>
                    <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 text-sm text-amber-800">
                        No gameplan is available for {grassInfo?.name || lawnProfile.specificGrass} in Zone {lawnProfile.zone} — this combination may not be recommended for your area.
                    </div>
                </div>
            );
        }

        // Build list of entries with only gameplan-relevant tasks
        const allEntries = program.schedule.map(entry => ({
            ...entry,
            gameplanTasks: (entry.tasks || []).filter(isGameplanTask)
        })).filter(e => e.gameplanTasks.length > 0);

        // "Coming Up": current month + next 2 months of entries
        const upcomingEntries = allEntries.filter(entry => {
            if (isCurrentMonthEntry(entry.month)) return true;
            const entryStart = monthIndexForEntry(entry.month);
            if (entryStart < 0) return false;
            const next1 = (currentMonthIdx + 1) % 12;
            const next2 = (currentMonthIdx + 2) % 12;
            return entryStart === next1 || entryStart === next2;
        });

        const MonthCard = ({ entry, isCurrent }) => (
            <div className={`rounded-xl border-2 p-4 ${isCurrent ? 'border-[#367C2B] bg-[#e8f5e9]' : 'border-gray-100 bg-white shadow-sm'}`}>
                <div className="flex items-center justify-between mb-3">
                    <div className="font-bold text-gray-800 flex items-center gap-1.5">
                        {isCurrent && <span className="text-[#367C2B]">▶</span>}
                        <span>{entry.month}</span>
                        {isCurrent && <span className="text-xs font-semibold text-[#367C2B] bg-white px-2 py-0.5 rounded-full border border-[#367C2B] ml-1">Now</span>}
                    </div>
                    {entry.importance && <span className="text-xs font-bold text-white bg-orange-500 px-2 py-0.5 rounded-full">{entry.importance}</span>}
                </div>
                {entry.soilTemp && <div className="text-xs text-gray-500 mb-2">Target soil temp: {entry.soilTemp}</div>}
                <div className="space-y-2">
                    {entry.gameplanTasks.map((task, j) => {
                        const meta = getTaskMeta(task);
                        const ws = weather ? getTaskWeatherStatus(task, weather) : null;
                        return (
                            <div key={j} className="flex items-start gap-2">
                                <span className="text-base mt-0.5 shrink-0">{meta.icon}</span>
                                <div className="flex-1 min-w-0">
                                    <div className="flex items-center gap-1.5 flex-wrap">
                                        <span className={`text-xs font-bold px-1.5 py-0.5 rounded border ${meta.color}`}>{meta.label}</span>
                                        {ws && <span className={`text-xs font-semibold px-1.5 py-0.5 rounded ${ws.status === 'go' ? 'bg-[#e8f5e9] text-[#367C2B]' : ws.status === 'caution' ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-700'}`}>{ws.status === 'go' ? '✓ Good timing' : ws.status === 'caution' ? '⚠ Note' : '✕ Hold'}</span>}
                                    </div>
                                    <div className="text-sm text-gray-700 mt-0.5">{task}</div>
                                    {ws && ws.reason && <div className={`text-xs mt-0.5 ${ws.status === 'go' ? 'text-[#367C2B]' : ws.status === 'caution' ? 'text-amber-600' : 'text-red-600'}`}>{ws.reason}</div>}
                                </div>
                            </div>
                        );
                    })}
                </div>
            </div>
        );

        return (
            <div className="space-y-4 animate-fade-in pb-4">
                <div>
                    <h2 className="text-2xl font-bold">📅 Lawn Care Program</h2>
                    <div className="text-sm text-gray-500 mt-0.5">
                        {grassInfo?.name || lawnProfile.specificGrass} · Zone {lawnProfile.zone}
                        {lawnProfile.lawnSize && ` · ${Number(lawnProfile.lawnSize).toLocaleString()} sq ft`}
                    </div>
                </div>

                {/* Rough estimate disclaimer */}
                <div className="bg-blue-50 border border-blue-200 rounded-xl p-3 flex gap-2">
                    <span className="text-blue-500 text-base shrink-0 mt-0.5">ℹ️</span>
                    <p className="text-xs text-blue-800 leading-relaxed">
                        <strong>Heads up:</strong> This plan is a general estimate based on your grass type and zone. Actual timing may vary depending on your past treatments, local weather changes, and how your lawn is responding this season. Always adjust accordingly.
                    </p>
                </div>

                {program.warning && (
                    <div className="bg-amber-50 border border-amber-300 rounded-xl p-3 text-sm text-amber-800">
                        ⚠️ {program.warning}
                    </div>
                )}

                {/* Tabs */}
                <div className="flex gap-2 bg-gray-100 p-1 rounded-lg">
                    <button onClick={() => setActiveTab('upcoming')}
                        className={`flex-1 py-2 text-sm font-semibold rounded-md transition btn-press ${activeTab === 'upcoming' ? 'bg-[#367C2B] text-white shadow' : 'text-gray-600'}`}>
                        Coming Up
                    </button>
                    <button onClick={() => setActiveTab('full')}
                        className={`flex-1 py-2 text-sm font-semibold rounded-md transition btn-press flex items-center justify-center gap-1.5 ${activeTab === 'full' ? 'bg-[#367C2B] text-white shadow' : 'text-gray-600'}`}>
                        Full Year
                        <span className={`text-xs font-bold px-1.5 py-0.5 rounded-full ${activeTab === 'full' ? 'bg-white/20 text-white' : 'bg-amber-100 text-amber-700'}`}>PRO</span>
                    </button>
                </div>

                {activeTab === 'upcoming' && (
                    <div className="space-y-3">
                        {upcomingEntries.length === 0 ? (
                            <div className="bg-gray-50 rounded-xl p-6 text-center">
                                <div className="text-2xl mb-2">✅</div>
                                <div className="font-semibold text-gray-700">You're in a quiet period</div>
                                <div className="text-sm text-gray-500 mt-1">No scheduled treatments in the next couple months. Switch to Full Year to see the whole plan.</div>
                            </div>
                        ) : (
                            upcomingEntries.map((entry, i) => (
                                <MonthCard key={i} entry={entry} isCurrent={isCurrentMonthEntry(entry.month)} />
                            ))
                        )}
                    </div>
                )}

                {activeTab === 'full' && (
                    <div className="space-y-3">
                        {/* Early tester access banner */}
                        <div className="rounded-xl border flex items-center gap-3 px-3 py-2.5" style={{borderColor:'var(--ys-gold-300)', background:'linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%)'}}>
                            <div className="w-7 h-7 rounded-lg flex items-center justify-center flex-shrink-0" style={{background:'var(--ys-gold-500)'}}>
                                <span className="text-white text-xs">⭐</span>
                            </div>
                            <div className="flex-1 min-w-0">
                                <div className="font-bold text-gray-900 text-xs leading-tight" style={{fontFamily:'var(--ys-font-display)'}}>Yardstick Pro — Early Tester Access</div>
                                <div className="text-xs mt-0.5 text-gray-500">Full Year Plan is a Pro feature. You have early tester access.</div>
                            </div>
                        </div>

                        {/* Full year content — unlocked for early testers */}
                        <div className="space-y-3">
                            <div className="text-xs text-gray-500 px-1">{program.description}</div>
                            {allEntries.map((entry, i) => (
                                <MonthCard key={i} entry={entry} isCurrent={isCurrentMonthEntry(entry.month)} />
                            ))}
                        </div>
                    </div>
                )}

                {program.sources && program.sources.length > 0 && (
                    <div className="bg-white rounded-xl shadow-sm p-4 border border-gray-100">
                        <div className="text-xs font-bold text-gray-500 uppercase mb-2">📚 Research Sources</div>
                        <div className="space-y-1">
                            {program.sources.map((s, i) => (
                                <div key={i} className="flex items-start gap-2 text-xs">
                                    <span className="text-[#367C2B] mt-0.5">·</span>
                                    {s.url ? <a href={s.url} target="_blank" rel="noopener noreferrer" className="text-[#367C2B] hover:text-[#2d6323] underline font-semibold">{s.institution || s.name}</a> : <span className="font-semibold text-gray-700">{s.institution || s.name}</span>}
                                    {s.title && <span className="text-gray-400">— {s.title}</span>}
                                </div>
                            ))}
                        </div>
                    </div>
                )}
            </div>
        );
    };

    // ─── Settings ────────────────────────────────────────────────────────────────

    const AccountPage = ({ activities, equipment, lawnProfile, store, currentUser, onSignOut, onSignIn, firebaseConfigured, userName, onUserNameChange, onNavigate }) => {
        const EMAIL = 'yardsticklawncareapp@gmail.com';
        const fb = window.__FIREBASE__ || {};

        // ── Name field state ─────────────────────────────────────────────────────
        const resolvedName = userName || (currentUser?.displayName?.split(' ')[0]) || '';
        const [nameInput, setNameInput] = React.useState(resolvedName);
        const [nameEditing, setNameEditing] = React.useState(false);
        const saveName = () => { onUserNameChange(nameInput); setNameEditing(false); };

        // ── Share ────────────────────────────────────────────────────────────────
        const [shareCopied, setShareCopied] = React.useState(false);
        const handleShare = () => {
            const msg = '🌿 I\'ve been tracking my lawn care with Yardstick — it\'s free and research-backed! Check it out: https://yardstick.diy';
            navigator.clipboard.writeText(msg).then(() => {
                setShareCopied(true);
                setTimeout(() => setShareCopied(false), 2500);
            });
        };

        // ── Data management ──────────────────────────────────────────────────────
        const [dataOpen, setDataOpen] = React.useState(false);
        const exportData = () => {
            const data = { activities, equipment, profile: lawnProfile };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `yardstick-backup-${new Date().toISOString().split('T')[0]}.json`;
            link.click();
        };
        const resetData = () => {
            if (confirm('⚠️ Delete ALL data? This cannot be undone!')) {
                localStorage.removeItem('lawnCareActivities');
                localStorage.removeItem('lawnCareEquipment');
                localStorage.removeItem('lawnProfile');
                localStorage.removeItem('yardstick_display_name');
                alert('✅ Data cleared');
                window.location.reload();
            }
        };

        // ── Pro waitlist ─────────────────────────────────────────────────────────
        const [proEmail, setProEmail] = React.useState(currentUser?.email || '');
        const [proSubmitting, setProSubmitting] = React.useState(false);
        const [proSubmitted, setProSubmitted] = React.useState(() => !!localStorage.getItem('yardstick_pro_interest_submitted'));
        const [proError, setProError] = React.useState(null);
        const handleProSignup = async (e) => {
            e.preventDefault();
            if (!proEmail.trim()) return;
            setProSubmitting(true); setProError(null);
            const payload = { email: proEmail.trim(), userId: currentUser?.uid || null, userName: resolvedName || null, submittedAt: new Date().toISOString() };
            const saveToLocal = () => {
                const existing = JSON.parse(localStorage.getItem('yardstick_pro_interest') || '[]');
                existing.push(payload);
                localStorage.setItem('yardstick_pro_interest', JSON.stringify(existing));
            };
            try {
                if (firebaseConfigured && fb.configured) {
                    try {
                        await fb.addDoc(fb.collection(fb.db, 'proInterest'), { ...payload, submittedAt: fb.serverTimestamp() });
                    } catch (fbErr) {
                        saveToLocal(); // Firebase failed — keep the signup locally
                    }
                } else {
                    saveToLocal();
                }
                localStorage.setItem('yardstick_pro_interest_submitted', 'true');
                setProSubmitted(true);
            } catch (err) {
                setProError('Could not submit — please try again.');
            } finally {
                setProSubmitting(false);
            }
        };

        // ── Yard + equipment summaries ────────────────────────────────────────────
        const hasProfile = lawnProfile && lawnProfile.specificGrass && lawnProfile.zone;
        const grassLabel = (lawnProfile?.specificGrass && GRASS_INFO[lawnProfile.specificGrass]?.name) || lawnProfile?.specificGrass || null;
        const zoneLabel = lawnProfile?.zone ? `Zone ${lawnProfile.zone.toUpperCase()}` : null;
        const zoneClimate = lawnProfile?.zone ? (ZONE_INFO[lawnProfile.zone] || ZONE_INFO[getParentZone(lawnProfile.zone)])?.climate : null;
        const sizeLabel = lawnProfile?.lawnSize || null;
        const activityCount = activities.length;
        const equipmentCount = equipment.length;

        return (
            <div className="space-y-4 animate-fade-in">
                <div>
                    {resolvedName && <div className="text-sm text-gray-400 mb-0.5">Welcome back, {resolvedName}</div>}
                    <h2 className="text-2xl font-bold text-gray-800" style={{fontFamily:'var(--ys-font-display)'}}>My Account</h2>
                </div>

                {/* ── 1. Account Status ───────────────────────────────────────── */}
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    {store.isCloud && currentUser ? (
                        <div className="p-4">
                            <div className="flex items-center gap-3 p-3 rounded-xl mb-3" style={{background:'#e8f5e9'}}>
                                <div className="text-2xl">☁️</div>
                                <div className="flex-1 min-w-0">
                                    <div className="font-bold text-sm" style={{color:'var(--ys-green-600)'}}>Cloud Sync Active</div>
                                    <div className="text-xs text-gray-500 truncate">{currentUser.displayName || currentUser.email}</div>
                                    <div className="text-xs text-gray-400 mt-0.5">Your data is backed up and synced across devices</div>
                                </div>
                            </div>
                            <button onClick={onSignOut} className="w-full py-2.5 px-4 bg-gray-100 text-gray-600 rounded-xl font-semibold text-sm">Sign Out</button>
                        </div>
                    ) : (
                        <div className="p-4">
                            <div className="flex items-start gap-3 p-3 rounded-xl mb-4 bg-amber-50">
                                <div className="text-2xl mt-0.5">📱</div>
                                <div>
                                    <div className="font-bold text-sm text-amber-800">Saved to this device only</div>
                                    <div className="text-xs text-amber-700 mt-0.5">Your data lives in this browser. If you clear your cache or switch devices, it's gone.</div>
                                </div>
                            </div>
                            <div className="mb-3 space-y-1.5 text-xs text-gray-500">
                                {[
                                    ['☁️', 'Sync across all your devices'],
                                    ['🔒', 'Never lose your lawn history'],
                                    ['📊', 'Access your data anywhere'],

                                        <span>{icon}</span><span>{text}</span>

                            {firebaseConfigured && (

                                    Already have an account? Sign in
                                </button>
                            )}
                        </div>
                    )}
                </div>

                {/* ── 2. Name & Personalization ───────────────────────────────── */}
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
                    <div className="flex items-center justify-between mb-3">
                        <div>
                            <div className="font-bold text-gray-800 text-sm">Your Name</div>

    function LawnCareTracker() {
        const [activities, setActivities] = useState([]);
        const [view, setView] = useState(null);
        const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
        const [selectedActivityType, setSelectedActivityType] = useState(null);
        const [weather, setWeather] = useState(null);
        const [weatherLoading, setWeatherLoading] = useState(true);
        const weatherFetchKeyRef = React.useRef(null);
        const [syncError, setSyncError] = useState(null);
        const [equipment, setEquipment] = useState([]);
        const [schedules, setSchedules] = useState(() => JSON.parse(localStorage.getItem('lawnCareSchedules') || '[]'));
        const [lawnProfile, setLawnProfile] = useState(null);
        const [statsView, setStatsView] = useState('year');
        const [profileFormData, setProfileFormData] = useState(() => {
            const s = localStorage.getItem('lawnProfile');
            return s ? JSON.parse(s) : { lawnSize: '', zone: '', specificGrass: '', soilType: '', zipCode: '' };
        });
        const [profileEditing, setProfileEditing] = useState(() => {
            const s = localStorage.getItem('lawnProfile');
            if (!s) return true;
            const p = JSON.parse(s);
            return !p.specificGrass || !p.zone;
        });
        const [zipLookupLoading, setZipLookupLoading] = useState(false);
        const [zipLookupError, setZipLookupError] = useState('');

        // ── Auth state ──────────────────────────────────────────────────────────
        const [currentUser, setCurrentUser] = useState(null);
        const [authReady, setAuthReady] = useState(false);
        const [showAuthModal, setShowAuthModal] = useState(false);
        const [dataLoading, setDataLoading] = useState(true);
        const [userName, setUserName] = useState(() => localStorage.getItem('yardstick_display_name') || '');
        const handleUserNameChange = (name) => {
            const trimmed = name.trim();
            setUserName(trimmed);
            if (trimmed) localStorage.setItem('yardstick_display_name', trimmed);
            else localStorage.removeItem('yardstick_display_name');
        };
        const fb = window.__FIREBASE__ || {};

        // ── Data store (wraps localStorage ↔ Firestore) ─────────────────────────
        const store = useDataStore(currentUser);

        // ── Listen for Firebase auth state ──────────────────────────────────────
        // Firebase is loaded via <script type="module"> with async imports, so it
        // may not be ready when React first mounts. We check if window.__FIREBASE__
        // is already set; if not, we wait for the 'firebase-ready' event before
        // attaching the auth state listener. This prevents the refresh-logout bug
        // where the effect would see fb.configured === false and immediately mark
        // authReady=true, causing the app to run in local-only mode.
        useEffect(() => {
            const setupAuth = () => {
                const firebase = window.__FIREBASE__ || {};
                if (!firebase.configured) {
                    setAuthReady(true);
                    return () => {};
                }
                const unsub = firebase.onAuthStateChanged(firebase.auth, (user) => {
                    setCurrentUser(user);
                    setAuthReady(true);
                });
                return unsub;
            };

            if (window.__FIREBASE__ !== undefined) {
                // Firebase already initialized before React mounted
                return setupAuth();
            }

            // Firebase module still loading — wait for it
            let cleanupAuth = () => {};
            const onFirebaseReady = () => {
                cleanupAuth = setupAuth() || (() => {});
            };
            window.addEventListener('firebase-ready', onFirebaseReady, { once: true });
            return () => {
                window.removeEventListener('firebase-ready', onFirebaseReady);
                cleanupAuth();
            };
        }, []);

        // ── Load data whenever auth state settles or user changes ───────────────
        useEffect(() => {
            if (!authReady) return;
            setDataLoading(true);
            store.loadAll().then(({ activities: acts, equipment: eq, profile: prof }) => {
                setSyncError(null);
                setActivities(acts || []);
                setEquipment(eq || []);
                if (prof) {
                    setLawnProfile(prof);
                    setProfileFormData(prof);
                    setProfileEditing(!prof.specificGrass || !prof.zone);
                    fetchWeatherData(prof.lat, prof.lon, prof.zipCode);
                } else {
                    fetchWeatherData();
                }
                setDataLoading(false);
            }).catch((e) => {
                console.error('Failed to load data:', e);
                setSyncError('Could not load your cloud data — showing last saved data. Check your connection.');
                setDataLoading(false);
            });
        }, [authReady, currentUser]);

        const handleSignOut = async () => {
            if (fb.configured) await fb.signOut(fb.auth);
            setCurrentUser(null);
        };

        const fetchWeatherData = async (lat, lon, label) => {
            if (!lat || !lon) {
                const stored = localStorage.getItem('lawnProfile');
                if (stored) {
                    const p = JSON.parse(stored);
                    lat = p.lat; lon = p.lon; label = label || p.zipCode || '';
                }
            }
            if (!lat || !lon) { setWeatherLoading(false); return; }
            const fetchKey = `${lat},${lon}`;
            if (weatherFetchKeyRef.current === fetchKey) return;
            weatherFetchKeyRef.current = fetchKey;
            try {
                const response = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
                    `&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weathercode,windspeed_10m,winddirection_10m` +
                    `&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,uv_index_max,et0_fao_evapotranspiration` +
                    `&temperature_unit=fahrenheit&precipitation_unit=inch&windspeed_unit=mph&timezone=auto&past_days=7&forecast_days=14`
                );
                const data = await response.json();
                const airTemp = data.current.temperature_2m;
                const soilTemp = Math.round(airTemp - 7);
                const dailyHighs = data.daily.temperature_2m_max || [];
                const dailyLows = data.daily.temperature_2m_min || [];
                const dailyPrecip = data.daily.precipitation_sum || [];
                const dailyPrecipP = data.daily.precipitation_probability_max || [];
                const dailyET0 = data.daily.et0_fao_evapotranspiration || [];
                const dailyDates = data.daily.time || [];
                let weeklyRainfall = 0;
                for (let i = 0; i <= 6 && i < dailyPrecip.length; i++) weeklyRainfall += (dailyPrecip[i] || 0);
                weeklyRainfall = Math.round(weeklyRainfall * 10) / 10;
                const rainNext24h = Math.round((dailyPrecip[7] || 0) * 100) / 100;
                const rainNext48h = Math.round(((dailyPrecip[7] || 0) + (dailyPrecip[8] || 0)) * 100) / 100;
                const rainNext72h = Math.round(((dailyPrecip[7] || 0) + (dailyPrecip[8] || 0) + (dailyPrecip[9] || 0)) * 100) / 100;
                let frostRiskDays = null;
                for (let i = 7; i < dailyLows.length; i++) {
                    if ((dailyLows[i] ?? 999) <= 32) { frostRiskDays = i - 7; break; }
                }
                const pastHighs = dailyHighs.slice(0, 7);
                const futureHighs = dailyHighs.slice(7, 14);
                const pastAvgSoilTemp = pastHighs.length ? Math.round(pastHighs.reduce((s,v) => s + ((v ?? airTemp) - 7), 0) / pastHighs.length) : soilTemp;
                const futureAvgSoilTemp = futureHighs.length ? Math.round(futureHighs.reduce((s,v) => s + ((v ?? airTemp) - 7), 0) / futureHighs.length) : soilTemp;
                const soilTempDelta = futureAvgSoilTemp - pastAvgSoilTemp;
                const soilTempTrend = soilTempDelta >= 3 ? 'warming' : soilTempDelta <= -3 ? 'cooling' : 'stable';
                const forecastDays = dailyDates.slice(7).map((date, i) => ({
                    date, high: Math.round(dailyHighs[7+i] ?? airTemp),
                    low: Math.round(dailyLows[7+i] ?? airTemp),
                    precip: Math.round((dailyPrecip[7+i] || 0) * 100) / 100,
                    precipProb: dailyPrecipP[7+i] ?? null,
                }));
                const wmoCode = data.current.weathercode;
                const condition = WMO_CODES[wmoCode] || { label: 'Unknown', icon: '🌡️' };
                setWeather({
                    temperature: Math.round(airTemp), feelsLike: Math.round(data.current.apparent_temperature),
                    soilTemp, humidity: data.current.relative_humidity_2m,
                    highTemp: Math.round(dailyHighs[7] ?? airTemp), lowTemp: Math.round(dailyLows[7] ?? airTemp),
                    rainfall: weeklyRainfall, precipitation: Math.round(data.current.precipitation * 100) / 100,
                    precipProbability: dailyPrecipP[7] ?? null,
                    windSpeed: Math.round(data.current.windspeed_10m), windDirection: getWindDirection(data.current.winddirection_10m),
                    uvIndex: data.daily.uv_index_max?.[7] ?? null,
                    conditionLabel: condition.label, conditionIcon: condition.icon,
                    location: label ? `Zip ${label}` : 'Your Location',
                    forecastDays, rainNext24h, rainNext48h, rainNext72h,
                    minTempNext14: Math.min(...dailyLows.slice(7).map(v => v ?? 999)),
                    frostRiskDays, pastAvgSoilTemp, futureAvgSoilTemp, soilTempTrend,
                    et0Past7: Math.round(dailyET0.slice(0, 7).reduce((s, v) => s + (v || 0), 0) * 100) / 100,
                });
                setWeatherLoading(false);
            } catch (error) {
                console.error('Weather fetch error:', error);
                setWeatherLoading(false);
            } finally {
                weatherFetchKeyRef.current = null;
            }
        };


        const lookupZoneByZip = async (zipOverride) => {
            const zip = (zipOverride || profileFormData.zipCode || '').trim();
            if (!/^\d{5}$/.test(zip)) { setZipLookupError('Enter a valid 5-digit US zip code.'); return; }
            setZipLookupError(''); setZipLookupLoading(true);
            try {
                const res = await fetch(`https://phzmapi.org/${zip}.json`);
                if (!res.ok) throw new Error('Not found');
                const data = await res.json();
                const zone = (data.zone || '').toLowerCase().trim();
                if (zone && ZONE_INFO[zone]) {
                    const lat = parseFloat(data.coordinates?.lat);
                    const lon = parseFloat(data.coordinates?.lon);
                    setProfileFormData(prev => ({ ...prev, zone, lat, lon, zipCode: zip }));
                    fetchWeatherData(lat, lon, zip);
                    const existing = localStorage.getItem('lawnProfile');
                    const merged = { ...(existing ? JSON.parse(existing) : {}), zone, lat, lon, zipCode: zip };
                    localStorage.setItem('lawnProfile', JSON.stringify(merged));
                    setLawnProfile(merged);
                } else {
                    setZipLookupError('Zone not found. Please select manually.');
                }

                                const lastFrost  = new Date(yr, zd.lastFrost.month  - 1, zd.lastFrost.day );
                                const dToFirst = Math.floor((firstFrost - now) / 864e5);
                                const dToLast  = Math.floor((lastFrost  - now) / 864e5);
                                let banner = null;
                                if (dToFirst >= 0 && dToFirst <= 45) {
                                    const urgency = dToFirst <= 7 ? 'urgent' : dToFirst <= 21 ? 'warning' : 'info';

                                        const s = MONTH_NAMES.indexOf(parts[0].trim()), e = MONTH_NAMES.indexOf(parts[1].trim());
                                        return s >= 0 && e >= 0 && curIdx >= s && curIdx <= e;
                                    }
                                    return false;
                                };
                                const isGameplanTask = (t) => !/\bmow(ing)?\b|mow (weekly|at|every)|watering|irrigat|water (as needed|deeply|1|0\.|per week)/.test(t.toLowerCase());
                                const currentEntry = program.schedule.find(e => isMatch(e.month));
                                const gameplanTasks = currentEntry ? (currentEntry.tasks || []).filter(isGameplanTask) : [];

                                const scoredTasks = gameplanTasks.map(task => {

                                                {upNext && !weather && <div className="text-xs text-gray-400 mt-1 pt-1 border-t border-gray-100">Up next: {upNext}</div>}
                                            </div>

                                            <div className="text-xs text-gray-500 mt-1">
                                                {upNext ? `Quiet period — next tasks in ${upNext}` : 'No scheduled treatments this month'}

                                        <button onClick={() => setView('dashboard')} className="text-xs font-bold text-[#367C2B] flex-shrink-0">{monthName} →</button>
                                    </div>
                                );

                    {view === 'history' && <div><button onClick={() => setView(null)} className="text-[#367C2B] mb-4 btn-press font-semibold">← Back</button><HistoryView activities={activities} onDelete={deleteActivity} /></div>}
                    {view === 'gallery' && <div><button onClick={() => setView(null)} className="text-[#367C2B] mb-4 btn-press font-semibold">← Back</button><GalleryView currentUser={currentUser} onSignIn={() => setShowAuthModal(true)} /></div>}
                    {view === 'garage' && <div><button onClick={() => setView(null)} className="text-[#367C2B] mb-4 btn-press font-semibold">← Back</button><MyGarage equipment={equipment} activities={activities} onAdd={addEquipment} onDelete={deleteEquipment} onUpdate={updateEquipment} onNavigate={setView} /></div>}
                    {view === 'profile' && <div><button onClick={() => setView(null)} className="text-[#367C2B] mb-4 btn-press font-semibold">← Back</button><LawnProfile profileFormData={profileFormData} profileEditing={profileEditing} lawnProfile={lawnProfile} weather={weather} zipLookupLoading={zipLookupLoading} zipLookupError={zipLookupError} onZipLookup={lookupZoneByZip} onSave={handleProfileSave} onEditToggle={setProfileEditing} onNavigate={setView} /></div>}
                    {view === 'gameplan' && <div><button onClick={() => setView(null)} className="text-[#367C2B] mb-4 btn-press font-semibold">← Back</button><YearlyGameplan lawnProfile={lawnProfile} weather={weather} onNavigate={setView} /></div>}
                    {view === 'schedules' && <div><button onClick={() => setView(null)} className="text-[#367C2B] mb-4 btn-press font-semibold">← Back</button><SchedulesView schedules={schedules} onAdd={addSchedule} onDelete={deleteSchedule} onLog={logScheduledActivity} /></div>}
                    {view === 'dashboard' && <div><button onClick={() => setView(null)} className="text-[#367C2B] mb-4 btn-press font-semibold">← Back</button><Dashboard activities={activities} statsView={statsView} onStatsViewChange={setStatsView} weather={weather} lawnProfile={lawnProfile} onNavigate={setView} /></div>}
                    {view === 'products' && <div><button onClick={() => setView(null)} className="text-[#367C2B] mb-4 btn-press font-semibold">← Back</button><ProductGuide /></div>}
                    {view === 'sources' && <div><button onClick={() => setView(null)} className="text-[#367C2B] mb-4 btn-press font-semibold">← Back</button><ResearchSourcesPage /></div>}
                    {view === 'account' && <div><button onClick={() => setView(null)} className="text-[#367C2B] mb-4 btn-press font-semibold">← Back</button><AccountPage activities={activities} equipment={equipment} lawnProfile={lawnProfile} store={store} currentUser={currentUser} onSignOut={handleSignOut} onSignIn={() => setShowAuthModal(true)} firebaseConfigured={!!fb.configured} userName={userName} onUserNameChange={handleUserNameChange} onNavigate={setView} /></div>}
                    {view === 'contact' && <div><button onClick={() => setView(null)} className="text-[#367C2B] mb-4 btn-press font-semibold">← Back</button><ContactPage currentUser={currentUser} firebaseConfigured={!!fb.configured} /></div>}

                    {/* ─── Feedback Footer ─────────────────────────────────── */}
                    <div className="mt-8 mb-4 rounded-xl border border-[#367C2B]/20 bg-[#367C2B]/5 px-4 py-3 flex items-center gap-3">
                        <span className="text-xl flex-shrink-0">💬</span>
                        <div className="flex-1 min-w-0">
                            <div className="text-sm font-semibold text-gray-700">Found a bug or have feedback?</div>
                            <div className="text-xs text-gray-400">Help us improve Yardstick during beta</div>
                        </div>
                        <a
                            href="mailto:yardsticklawncareapp@gmail.com?subject=Yardstick%3A%20Feedback"
                            className="flex-shrink-0 bg-[#367C2B] text-white text-xs font-bold px-3 py-2 rounded-lg btn-press transition"
                            style={{textDecoration:'none'}}
                        >
                            Email Us
                        </a>
                    </div>
                    </main>
                </div>

                {/* ─── Mobile FAB: Log Activity ───────────────────────────── */}
                {view !== 'add' && (
                    <button
                        className="md:hidden fixed ys-fab"
                        style={{
                            bottom: 'calc(20px + env(safe-area-inset-bottom, 0px))',
                            right: '20px',
                            width: '56px',
                            height: '56px',
                            borderRadius: '50%',
                            background: 'var(--ys-green-600)',
                            border: 'none',
                            cursor: 'pointer',
                            zIndex: 30,
                            boxShadow: '0 4px 20px rgba(54,124,43,0.45)',
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center',
                            color: 'white',
                        }}
                        onClick={() => { setView('add'); setSelectedActivityType(null); setMobileMenuOpen(false); }}
                        aria-label="Log Activity"
                    >
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round">
                            <path d="M12 4v16m8-8H4"/>
                        </svg>
                    </button>
                )}
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LawnCareTracker />);
</script>

</body>
</html>
