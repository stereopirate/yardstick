                                        <a href={s.url} target="_blank" rel="noopener noreferrer" style={{fontSize: 13}}>
                                            {s.name || s.institution}
                                        </a>
                                    ) : (
                                        <span style={{fontSize: 13, fontWeight: 600, color: '#333'}}>{s.name || s.institution}</span>
                                    )}
                                    {(s.topic || s.title) && (
                                        <div style={{fontSize: 11, color: '#666', marginTop: 1}}>{s.topic || s.title}</div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </React.Fragment>
                )}
            </span>
        );
    };

    // ─── Data constants live in constants.js (loaded above as a regular script) ──
    // PRODUCT_DATABASE, TREATMENT_PRODUCTS, TREATMENT_CATEGORIES, ACTIVITY_TYPES,
    // ACTIVITY_COLORS, RESEARCH_SOURCES, GRASS_KEY_MAP, MONTH_NAMES,
    // GRASS_INFO, ZONE_INFO — all available as globals.

    const getParentZone = (zone) => zone ? zone.replace(/[ab]$/i, '') : zone;

    // ─── Shared pure helpers (no React state) ──────────────────────────────────
    const WMO_CODES = {
        0: { label: 'Clear Sky', icon: '☀️' }, 1: { label: 'Mainly Clear', icon: '🌤️' },
        2: { label: 'Partly Cloudy', icon: '⛅' }, 3: { label: 'Overcast', icon: '☁️' },
        45: { label: 'Foggy', icon: '🌫️' }, 48: { label: 'Icy Fog', icon: '🌫️' },
        51: { label: 'Light Drizzle', icon: '🌦️' }, 53: { label: 'Drizzle', icon: '🌦️' },
        55: { label: 'Heavy Drizzle', icon: '🌧️' }, 61: { label: 'Light Rain', icon: '🌧️' },
        63: { label: 'Rain', icon: '🌧️' }, 65: { label: 'Heavy Rain', icon: '🌧️' },
        71: { label: 'Light Snow', icon: '🌨️' }, 73: { label: 'Snow', icon: '❄️' },
        75: { label: 'Heavy Snow', icon: '❄️' }, 80: { label: 'Light Showers', icon: '🌦️' },
        81: { label: 'Showers', icon: '🌧️' }, 82: { label: 'Heavy Showers', icon: '⛈️' },
        95: { label: 'Thunderstorm', icon: '⛈️' }, 99: { label: 'Thunderstorm w/ Hail', icon: '⛈️' }
    };

    const getWindDirection = (deg) => {
        const dirs = ['N','NE','E','SE','S','SW','W','NW'];
        return dirs[Math.round(deg / 45) % 8];
    };

    // ─── Weather Advisory Engine ──────────────────────────────────────────────────
    const generateAdvisories = (w) => {
        if (!w) return [];
        const candidates = [];
        const rain24 = w.rainNext24h || 0;
        const rain48 = w.rainNext48h || 0;
        const rain72 = w.rainNext72h || 0;
        const weeklyTarget = (w.et0Past7 && w.et0Past7 > 0) ? w.et0Past7 : 1.25;
        const waterDeficit = weeklyTarget - (w.rainfall || 0) - rain48;
        const frost = w.frostRiskDays;

        // Priority 0: imminent frost
        if (frost !== null && frost <= 3) {
            const when = frost === 0 ? 'next 24h' : `${frost} day${frost !== 1 ? 's' : ''}`;
            candidates.push({ priority: 0, status: 'hold', icon: '🌡️', title: `Frost in ${when}`, detail: 'Hold all seeding, overseeding, and chemical applications until after frost.' });
        }
        // Priority 1: heavy rain — hold fertilizing & sprays
        if (rain24 > 0.75) {
            candidates.push({ priority: 1, status: 'hold', icon: '🌧️', title: `Heavy rain today (${rain24}")`, detail: 'Hold granular fertilizer and spray treatments — product will wash off or leach.' });
        }
        // Priority 2: irrigation deficit + no incoming rain
        if (waterDeficit > weeklyTarget * 0.5 && rain72 < 0.1) {
            candidates.push({ priority: 2, status: 'hold', icon: '💧', title: 'Lawn water deficit', detail: `Deficit ~${Math.round(waterDeficit * 100) / 100}" vs ET0 target — irrigate deeply soon.` });
        }
        // Priority 3a: light rain today — good for granular, bad for spray
        if (rain24 > 0.1 && rain24 <= 0.75) {
            candidates.push({ priority: 3, status: 'caution', icon: '🌦️', title: `Light rain today (${rain24}")`, detail: 'Good window for granular fertilizer activation. Hold spray herbicides/fungicides.' });
        }
        // Priority 3b: heat stress
        if (w.highTemp > 90) {
            candidates.push({ priority: 3, status: 'caution', icon: '🌡️', title: `Heat advisory (${w.highTemp}°F high)`, detail: 'Mow early morning, raise blade height. Skip fertilizing until temps drop below 85°F.' });
        }
        // Priority 4: rain covered weekly ET0 need
        if (waterDeficit <= 0 && (w.rainfall || 0) > 0) {
            candidates.push({ priority: 4, status: 'go', icon: '✅', title: 'Irrigation need covered', detail: `${w.rainfall}" rain this week satisfies ET0 target — skip watering.` });
        }
        // Priority 5: clear, calm conditions — good for treatments
        if (rain24 < 0.1 && rain48 < 0.1 && w.windSpeed < 10 && (frost === null || frost > 7) && w.highTemp <= 90) {
            candidates.push({ priority: 5, status: 'go', icon: '✅', title: 'Good conditions today', detail: 'Calm, dry forecast — ideal window for mowing, trimming, and spray treatments.' });
        }

        candidates.sort((a, b) => a.priority - b.priority);
        return candidates.slice(0, 2);
    };

    const TodayAdvisoryCard = ({ weather }) => {
        const advisories = generateAdvisories(weather);
        if (!advisories.length) return null;
        const statusStyle = {
            hold:    { bg: '#FEF2F2', badge: '#EF4444', badgeText: '#fff', label: 'HOLD' },
            caution: { bg: '#FFFBEB', badge: '#F59E0B', badgeText: '#fff', label: 'NOTE' },
            go:      { bg: '#F0FDF4', badge: '#22C55E', badgeText: '#fff', label: 'GOOD' },
        };
        return (
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div className="flex items-center justify-between px-4 py-2.5 border-b border-gray-100">
                    <span className="text-xs font-bold text-gray-400 uppercase tracking-widest">Today's Advisory</span>
                    <span className="text-xs text-gray-400">{weather.location}</span>
                </div>
                {advisories.map((adv, i) => {
                    const s = statusStyle[adv.status];
                    return (
                        <div key={i} style={{backgroundColor: s.bg}} className={`px-4 py-3 ${i < advisories.length - 1 ? 'border-b border-white/60' : ''}`}>
                            <div className="flex items-start gap-2.5">
                                <span className="text-lg flex-shrink-0 mt-0.5">{adv.icon}</span>
                                <div className="flex-1 min-w-0">
                                    <div className="flex items-center gap-2 flex-wrap mb-0.5">
                                        <span className="text-xs font-bold px-1.5 py-0.5 rounded-full" style={{backgroundColor: s.badge, color: s.badgeText}}>{s.label}</span>
                                        <span className="text-sm font-bold text-gray-800">{adv.title}</span>
                                    </div>
                                    <p className="text-xs text-gray-600 leading-snug">{adv.detail}</p>
                                </div>
                            </div>
                        </div>
                    );
                })}
            </div>
        );
    };

    const getTaskWeatherStatus = (taskText, w) => {
        if (!w) return null;
        const t = taskText.toLowerCase();
        const isSeed = /seed|overseed|\bsod\b|plug/.test(t);
        const isPreEmergent = /pre-emergent|pre emergent|crabgrass prev|prodiamine|dithiopyr/.test(t);
        const isFertilizer = !isPreEmergent && /fertil|\bfeed\b|nitrogen|weed[- ]and[- ]feed|milorganite|scotts/.test(t);
        const isTreatment = !isPreEmergent && !isFertilizer && !isSeed && /herbicide|fungicide|insecticide|pesticide|post-emergent|treatment|\bspray\b|\bapply\b/.test(t);
        const isMowing = /\bmow\b|cut height|blade height|mowing/.test(t);
        const isWatering = /\bwater\b|irrigat|drought/.test(t);
        const isAeration = /aerat|core plug|plug pull/.test(t);
        const frost = w.frostRiskDays;
        const rainNext24 = w.rainNext24h || 0;
        const rainNext48 = w.rainNext48h || 0;
        const rainNext72 = w.rainNext72h || 0;
        const avgSoil = w.pastAvgSoilTemp ?? w.soilTemp;
        const soilTrend = w.soilTempTrend;
        if (isSeed) {
            if (frost !== null && frost <= 21) return { status: 'hold', reason: `Frost risk in ${frost === 0 ? 'next 24h' : frost + ' days'} — seedlings won't survive`, window: 'Wait until 21+ frost-free days in forecast' };
            if (rainNext24 > 0.5) return { status: 'hold', reason: `Heavy rain (${rainNext24}") in next 24h — seeds wash away`, window: 'Apply after rain passes' };
            if (avgSoil < 50) return { status: 'hold', reason: `Soil avg ${avgSoil}°F is below germination threshold (50°F min)`, window: 'Wait for sustained soil temps above 50°F' };
            return { status: 'go', reason: 'Soil temps and forecast look favorable for seeding', window: null };
        }
        if (isPreEmergent) {
            if (avgSoil >= 55) return { status: 'hold', reason: `Soil avg ${avgSoil}°F — pre-emergent window has passed`, window: 'Switch to post-emergent control' };
            if (rainNext48 > 0.75) return { status: 'hold', reason: `Heavy rain (${rainNext48}") in 48h may wash product before it binds`, window: 'Apply after heavy rain event' };
            return { status: 'go', reason: `Soil avg ${avgSoil}°F is in the pre-emergent window`, window: null };
        }
        if (isFertilizer) {
            if (avgSoil < 50) return { status: 'hold', reason: `Soil avg ${avgSoil}°F — grass not actively growing, can't uptake nutrients`, window: 'Wait for soil temps above 50°F' };
            if (rainNext24 > 0.75) return { status: 'hold', reason: `Heavy rain (${rainNext24}") in next 24h — fertilizer leaches before roots absorb`, window: rainNext72 <= 0.25 ? 'Apply in ~72h' : 'Wait for next dry window' };
            if (w.highTemp > 90) return { status: 'caution', reason: `High of ${w.highTemp}°F — fertilizer can burn heat-stressed turf`, window: null };
            if (rainNext48 > 0.5) return { status: 'caution', reason: `Moderate rain (${rainNext48}") in 48h — watch for runoff on slopes`, window: null };
            if (rainNext48 < 0.1 && rainNext72 < 0.1) return { status: 'caution', reason: `No rain in forecast — water in within 24h after granular application to activate`, window: 'Apply early morning, then irrigate lightly' };
            return { status: 'go', reason: `Light rain (${rainNext48}") in forecast — ideal to activate granular fertilizer without leaching`, window: null };
        }
        if (isTreatment) {
            if (rainNext24 > 0.1) return { status: 'hold', reason: `Rain expected in next 24h — product washes off`, window: 'Apply after rain clears' };
            if (w.windSpeed > 10) return { status: 'hold', reason: `Wind at ${w.windSpeed} mph — spray drift risk`, window: 'Apply when wind drops below 10 mph' };
            return { status: 'go', reason: 'Clear, calm conditions — good window for treatment', window: null };
        }
        if (isMowing) {
            if (w.precipitation > 0.05 || (w.conditionLabel || '').toLowerCase().includes('rain')) return { status: 'caution', reason: 'Grass is wet — mowing wet spreads disease', window: 'Wait until grass dries' };
            return { status: 'go', reason: 'Good conditions for mowing', window: null };
        }
        if (isWatering) {
            const weeklyTarget = (w.et0Past7 && w.et0Past7 > 0) ? w.et0Past7 : 1.25;
            const deficit = weeklyTarget - (w.rainfall || 0) - rainNext48;
            const deficitRounded = Math.round(Math.max(0, deficit) * 100) / 100;
            const targetLabel = (w.et0Past7 && w.et0Past7 > 0) ? `ET0 need (${weeklyTarget}")` : `est. weekly need (${weeklyTarget}")`;
            if (deficit <= 0) return { status: 'hold', reason: `Rain covers ${targetLabel} — skip irrigation this cycle`, window: null };
            if (deficitRounded < 0.25) return { status: 'caution', reason: `Small deficit (~${deficitRounded}") vs ${targetLabel} — monitor before irrigating`, window: null };
            return { status: 'go', reason: `Deficit ~${deficitRounded}" vs ${targetLabel} — supplemental irrigation recommended`, window: null };
        }
        return null;
    };


    // ─── SeasonBanner ────────────────────────────────────────────────────────────
    // ── Season Banner ────────────────────────────────────────────────────────
    const SeasonBanner = ({ weather }) => {
        const month = new Date().getMonth();
        let seasonLabel, seasonDetail, bannerIcon, actionText, gradFrom, gradTo;
        if (weather) {
            const avgSoil = weather.pastAvgSoilTemp ?? weather.soilTemp;
            const trend = weather.soilTempTrend;
            const trendStr = trend === 'warming' ? ' · warming' : trend === 'cooling' ? ' · cooling' : '';
            const soilStr = `Soil avg ${avgSoil}°F${trendStr}`;
            if (weather.frostRiskDays !== null && weather.frostRiskDays <= 7) {
                const when = weather.frostRiskDays === 0 ? 'next 24h' : `${weather.frostRiskDays} days`;
                seasonLabel = 'Frost Alert'; bannerIcon = '🌡️';
                seasonDetail = `Freezing temps in ${when}`;
                actionText = '→ Hold seeding & treatments';
                gradFrom = '#1e3a5f'; gradTo = '#1e4875';
            } else if (avgSoil < 45) {
                seasonLabel = 'Dormant Season'; bannerIcon = '❄️';
                seasonDetail = soilStr;
                actionText = '→ Plan pre-emergent timing';
                gradFrom = '#1e3a5f'; gradTo = '#1e4875';
            } else if (avgSoil < 55) {
                seasonLabel = 'Early Spring'; bannerIcon = '🌤️';
                seasonDetail = soilStr;
                actionText = trend === 'warming' ? '→ Pre-emergent window opening' : '→ Check pre-emergent timing';
                gradFrom = '#6d3309'; gradTo = '#8a3f0a';
            } else if (avgSoil <= 70) {
                seasonLabel = 'Growing Season'; bannerIcon = '🌱';
                seasonDetail = soilStr;
                actionText = '→ Prime time for lawn care';
                gradFrom = '#1a4f14'; gradTo = '#2d6b20';
            } else if (avgSoil <= 85) {
                seasonLabel = 'Peak Summer'; bannerIcon = '☀️';
                seasonDetail = soilStr;
                actionText = '→ Raise mow height';
                gradFrom = '#7c2d12'; gradTo = '#9a3412';
            } else {
                seasonLabel = 'Heat Stress'; bannerIcon = '🔥';
                seasonDetail = soilStr;
                actionText = '→ Water deeply';
                gradFrom = '#7f1d1d'; gradTo = '#991b1b';
            }
        } else if (month >= 10 || month <= 1) {
            seasonLabel = 'Dormant Season'; bannerIcon = '❄️';
            seasonDetail = 'Plan your spring pre-emergent timing';
            actionText = '→ Plan pre-emergent timing';
            gradFrom = '#1e3a5f'; gradTo = '#1e4875';
        } else if (month >= 2 && month <= 4) {
            seasonLabel = 'Spring Season'; bannerIcon = '🌱';
            seasonDetail = 'Time for pre-emergent and first feeds';
            actionText = '→ Apply first feeds';
            gradFrom = '#1a4f14'; gradTo = '#2d6b20';
        } else if (month >= 5 && month <= 7) {
            seasonLabel = 'Summer Season'; bannerIcon = '☀️';
            seasonDetail = 'Focus on watering and mow height';
            actionText = '→ Raise mow height';
            gradFrom = '#7c2d12'; gradTo = '#9a3412';
        } else {
            seasonLabel = 'Fall Season'; bannerIcon = '🍂';
            seasonDetail = 'Best time to overseed and fertilize';
            actionText = '→ Overseed now';
            gradFrom = '#6d3309'; gradTo = '#8a3f0a';
        }
        return (
            <div className="animate-fade-in" style={{background: `linear-gradient(135deg, ${gradFrom} 0%, ${gradTo} 100%)`}}>
                <div className="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
                    <div className="flex items-center gap-2.5">
                        <span className="text-xl">{bannerIcon}</span>
                        <div>
                            <div className="text-xs font-bold text-white/60 uppercase tracking-widest">{seasonLabel}</div>
                            <div className="text-xs text-white/80">{seasonDetail}</div>
                        </div>
                    </div>
                    <div className="text-xs font-semibold text-white/90 bg-white/10 border border-white/20 rounded-lg px-2.5 py-1.5 whitespace-nowrap flex-shrink-0 ml-3">
                        {actionText}
                    </div>
                </div>
            </div>
        );
    };

    // ─── ForecastImpactCard ──────────────────────────────────────────────────────
    const ForecastImpactCard = ({ tasks, weather }) => {
        if (!weather || !tasks || tasks.length === 0) return null;
        const evaluated = tasks.map(task => ({ task, result: getTaskWeatherStatus(task, weather) })).filter(r => r.result !== null);
        const holds = evaluated.filter(e => e.result.status === 'hold');
        const cautions = evaluated.filter(e => e.result.status === 'caution');
        if (holds.length === 0 && cautions.length === 0) {
            return (
                <div className="bg-[#e8f5e9] border border-[#367C2B] rounded-xl p-4">
                    <div className="flex items-center gap-2 mb-1">
                        <span className="text-base">✅</span>
                        <span className="text-sm font-bold text-[#367C2B]">Good Week for Lawn Work</span>
                    </div>
                    <div className="text-xs text-gray-600">Forecast conditions are favorable for all recommended tasks this month.</div>
                </div>
            );
        }
        return (
            <div className="bg-amber-50 border border-amber-300 rounded-xl p-4">
                <div className="flex items-center gap-2 mb-3">
                    <span className="text-base">⚠️</span>
                    <span className="text-sm font-bold text-gray-800">Weather Timing Alert</span>
                </div>
                <div className="space-y-3">
                    {holds.map((h, i) => (
                        <div key={i} className="flex items-start gap-2">
                            <span className="text-xs font-bold text-white bg-red-500 rounded px-1.5 py-0.5 shrink-0 mt-0.5">HOLD</span>
                            <div>
                                <div className="text-xs font-semibold text-gray-800">{h.task}</div>
                                <div className="text-xs text-gray-600 mt-0.5">{h.result.reason}</div>
                                {h.result.window && <div className="text-xs text-[#367C2B] font-medium mt-0.5">→ {h.result.window}</div>}
                            </div>
                        </div>
                    ))}
                    {cautions.map((c, i) => (
                        <div key={i} className="flex items-start gap-2">
                            <span className="text-xs font-bold text-white bg-amber-500 rounded px-1.5 py-0.5 shrink-0 mt-0.5">NOTE</span>
                            <div>
                                <div className="text-xs font-semibold text-gray-800">{c.task}</div>
                                <div className="text-xs text-gray-600 mt-0.5">{c.result.reason}</div>
                                {c.result.window && <div className="text-xs text-[#367C2B] font-medium mt-0.5">→ {c.result.window}</div>}
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );
    };

    // ─── WaterDeficitCard ────────────────────────────────────────────────────────
    const WaterDeficitCard = ({ grassInfo, weather }) => {
        if (!weather) return null;
        let weeklyNeed = 1.25;
        if (grassInfo && grassInfo.waterPerWeek) {
            const nums = grassInfo.waterPerWeek.match(/[\d.]+/g);
            if (nums && nums.length === 1) weeklyNeed = parseFloat(nums[0]);
            else if (nums && nums.length >= 2) weeklyNeed = (parseFloat(nums[0]) + parseFloat(nums[1])) / 2;
        }
        // Use ET0 evapotranspiration when available — more accurate than grass-type average
        const usingET0 = weather.et0Past7 && weather.et0Past7 > 0;
        if (usingET0) weeklyNeed = weather.et0Past7;
        const pastRain = weather.rainfall || 0;
        const forecastRain = weather.rainNext48h || 0;
        const deficit = Math.max(0, Math.round((weeklyNeed - pastRain - forecastRain) * 100) / 100);
        const surplus = pastRain + forecastRain >= weeklyNeed;
        const statusIcon = surplus ? '✅' : deficit < 0.5 ? '⚠️' : '💧';
        const statusColor = surplus ? 'text-[#367C2B]' : deficit < 0.5 ? 'text-amber-600' : 'text-blue-700';
        const statusMsg = surplus ? 'Weekly water need covered — skip supplemental irrigation'
            : deficit < 0.25 ? `Minor deficit (~${deficit}") — monitor and supplement if grass shows stress`
            : `Supplement with ~${deficit}" — water early morning for best absorption`;
        return (
            <div className="bg-blue-50 rounded-xl p-4">
                <div className="text-xs font-bold text-blue-700 uppercase mb-3">💧 Weekly Water Budget</div>
                <div className="grid grid-cols-3 gap-2 text-center mb-3">
                    <div className="bg-white rounded-lg p-2 shadow-sm"><div className="text-xs text-gray-500 mb-0.5">{usingET0 ? 'ET0 need' : 'Weekly need'}</div><div className="text-sm font-bold text-gray-800">{weeklyNeed}"</div></div>
                    <div className="bg-white rounded-lg p-2 shadow-sm"><div className="text-xs text-gray-500 mb-0.5">Past 7d rain</div><div className="text-sm font-bold text-gray-800">{pastRain}"</div></div>
                    <div className="bg-white rounded-lg p-2 shadow-sm"><div className="text-xs text-gray-500 mb-0.5">Forecast 48h</div><div className="text-sm font-bold text-gray-800">{forecastRain}"</div></div>
                </div>
                <div className={`text-xs font-semibold ${statusColor} flex items-center gap-1.5`}>
                    <span>{statusIcon}</span><span>{statusMsg}</span>
                </div>
            </div>
        );
    };

    // ─── WeatherSnapshot ─────────────────────────────────────────────────────────
    const WeatherSnapshot = ({ weather, weatherLoading, lawnProfile, zipLookupLoading, zipLookupError, onZipLookup }) => {
        const [zipInput, setZipInput] = useState('');
        if (weatherLoading) {
            return (
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-3 animate-pulse">
                    <div className="h-4 bg-gray-200 rounded w-1/3 mb-3"></div>
                    <div className="h-10 bg-gray-200 rounded w-1/2 mb-2"></div>
                    <div className="h-3 bg-gray-100 rounded w-1/4"></div>
                </div>
            );
        }
        if (!weather) return (
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 mb-3">
                <div className="flex items-center gap-2 mb-3">
                    <div className="text-2xl">📍</div>
                    <div className="font-semibold text-gray-700 text-sm">Enter your zip code for local weather</div>
                </div>
                <div className="flex gap-2">
                    <input type="text" inputMode="numeric" maxLength={5} value={zipInput} onChange={(e) => setZipInput(e.target.value)}
                        onKeyDown={(e) => { if (e.key === 'Enter') onZipLookup(zipInput); }}
                        placeholder="e.g. 43201" className="flex-1 px-3 py-2 border-2 rounded-lg text-sm" />
                    <button type="button" onClick={() => onZipLookup(zipInput)} disabled={zipLookupLoading}
                        className="px-4 py-2 bg-[#367C2B] text-white rounded-lg font-semibold text-sm disabled:opacity-60 whitespace-nowrap">
                        {zipLookupLoading ? 'Looking up...' : 'Get Weather'}
                    </button>
                </div>
                {zipLookupError && <div className="mt-1 text-xs text-red-600">{zipLookupError}</div>}
            </div>
        );

        let soilRec = '', soilRecColor = 'text-gray-700', soilAlert = null;
        const _curMon = new Date().getMonth();
        const _grassInfo = lawnProfile && GRASS_INFO[lawnProfile.specificGrass] ? GRASS_INFO[lawnProfile.specificGrass] : null;
        const _isCool = _grassInfo && _grassInfo.season === 'Cool Season';
        const _isWarm = _grassInfo && _grassInfo.season === 'Warm Season';
        const _isSpring = _curMon >= 1 && _curMon <= 5;
        const _isFall   = _curMon >= 7 && _curMon <= 10;
        const _st = weather.soilTemp;
        if (_isCool && _isSpring && _st >= 44 && _st < 50) {
            soilRec = '⚠️ Pre-emergent window approaching'; soilRecColor = 'text-amber-600';
            soilAlert = { level: 'warning', text: `Soil ${_st}°F — pre-emergent triggers at 50°F. Apply within the next 1–2 weeks.` };
        } else if (_isCool && _isSpring && _st >= 50 && _st <= 54) {
            soilRec = '🚨 Pre-emergent window open now'; soilRecColor = 'text-orange-600';
            soilAlert = { level: 'urgent', text: `Soil ${_st}°F — apply pre-emergent before it hits 55°F or crabgrass germinates!` };
        } else if (_isCool && _isSpring && _st >= 55 && _st <= 62) {
            soilRec = '🔴 Pre-emergent window has closed'; soilRecColor = 'text-red-600';
            soilAlert = { level: 'note', text: `Soil passed 55°F. Switch to post-emergent herbicide for crabgrass control this season.` };
        } else if (_isCool && _isFall && _st >= 50 && _st <= 65) {
            soilRec = '✅ Prime overseeding window'; soilRecColor = 'text-green-700';
            soilAlert = { level: 'go', text: `Soil ${_st}°F — ideal for cool-season seed germination. Overseed now for best results.` };
        } else if (_isCool && _isFall && _st > 0 && _st < 50) {
            soilRec = '⚠️ Seeding window is closing'; soilRecColor = 'text-amber-600';
            soilAlert = { level: 'warning', text: `Soil ${_st}°F — below 50°F germination threshold. Last call for overseeding this fall.` };
        } else if (_isWarm && _isSpring && _st >= 60 && _st < 65) {
            soilRec = '🌱 Warm-season grass emerging soon'; soilRecColor = 'text-green-700';
            soilAlert = { level: 'go', text: `Soil ${_st}°F — green-up is near. Hold fertilizer until soil consistently hits 65°F.` };
        } else if (_isWarm && _isSpring && _st >= 65 && _st <= 75) {
            soilRec = '✅ Green-up zone — fertilizer ready'; soilRecColor = 'text-[#367C2B]';
            soilAlert = { level: 'go', text: `Soil ${_st}°F — warm-season grass actively growing. Time for first fertilizer application.` };
        } else if (_st < 50) {
            soilRec = '❄️ Too cold for most lawn activity'; soilRecColor = 'text-blue-700';
        } else if (_st <= 65) {
            soilRec = '🌱 Good for cool-season grass care'; soilRecColor = 'text-green-700';
        } else if (_st <= 85) {
            soilRec = '☀️ Ideal growing conditions'; soilRecColor = 'text-[#367C2B]';
        } else {
            soilRec = '🔥 Very warm — focus on watering'; soilRecColor = 'text-orange-700';
        }

        const uvLabel = weather.uvIndex !== null
            ? weather.uvIndex <= 2 ? 'Low' : weather.uvIndex <= 5 ? 'Moderate' : weather.uvIndex <= 7 ? 'High' : 'Very High' : null;

        return (
            <div className="animate-fade-in">
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <div className="bg-gradient-to-r from-[#367C2B] to-[#4a9c3a] px-4 pt-4 pb-3">
                        <div className="flex items-start justify-between">
                            <div>
                                <div className="text-xs font-semibold text-green-200 uppercase tracking-widest mb-1">{weather.location} · Live</div>
                                <div className="flex items-end gap-2">
                                    <span className="text-5xl font-black text-white leading-none">{weather.temperature}°</span>
                                    <div className="pb-1.5">
                                        <div className="text-sm font-semibold text-green-100">Feels like {weather.feelsLike}°</div>
                                        <div className="text-xs text-green-200">H: {weather.highTemp}° · L: {weather.lowTemp}°</div>
                                    </div>
                                </div>
                            </div>
                            <div className="text-right">
                                <div className="text-4xl">{weather.conditionIcon}</div>
                                <div className="text-xs font-semibold text-green-100 mt-1.5 bg-white/10 rounded-lg px-2 py-0.5">{weather.conditionLabel}</div>
                            </div>
                        </div>
                    </div>
                    <div className="grid grid-cols-4 gap-1.5 p-1.5 bg-gray-50">
                        <div className="text-center py-2 px-1 bg-white rounded-xl shadow-sm">
                            <div className="text-xs text-gray-400 mb-0.5">Humidity</div>
                            <div className="text-sm font-bold text-gray-800">{weather.humidity}%</div>
                        </div>
                        <div className="text-center py-2 px-1 bg-white rounded-xl shadow-sm">
                            <div className="text-xs text-gray-400 mb-0.5">Wind</div>
                            <div className="text-sm font-bold text-gray-800">{weather.windSpeed} mph</div>
                        </div>
                        <div className="text-center py-2 px-1 bg-white rounded-xl shadow-sm">
                            <div className="text-xs text-gray-400 mb-0.5">7-Day Rain</div>
                            <div className="text-sm font-bold text-gray-800">{weather.rainfall}"</div>
                        </div>
                        <div className="text-center py-2 px-1 bg-white rounded-xl shadow-sm">
                            {weather.precipProbability !== null
                                ? <><div className="text-xs text-gray-400 mb-0.5">Rain %</div><div className="text-sm font-bold text-gray-800">{weather.precipProbability}%</div></>
                                : uvLabel ? <><div className="text-xs text-gray-400 mb-0.5">UV</div><div className="text-sm font-bold text-gray-800">{weather.uvIndex} {uvLabel}</div></>
                                : <><div className="text-xs text-gray-400 mb-0.5">UV</div><div className="text-sm font-bold text-gray-800">—</div></>}
                        </div>
                    </div>
                    <div className="border-t border-gray-100 flex items-center divide-x divide-gray-100">
                        <div className="flex-1 px-4 py-3">
                            <div className="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-0.5">Soil Temp</div>
                            <div className="flex items-baseline gap-1.5">
                                <span className="text-xl font-extrabold text-amber-600">{weather.soilTemp}°F</span>
                                <span className="text-xs text-gray-400">est. 4" depth</span>
                            </div>
                        </div>
                        <div className="flex-1 px-4 py-3">
                            <div className="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-0.5">Status</div>
                            <div className={`text-xs font-bold ${soilRecColor}`}>{soilRec}</div>
                        </div>
                    </div>
                    {soilAlert && (
                        <div className={`px-4 py-2.5 border-t flex items-start gap-2 ${
                            soilAlert.level === 'urgent'  ? 'bg-orange-50 border-orange-100' :
                            soilAlert.level === 'warning' ? 'bg-amber-50 border-amber-100'   :
                            soilAlert.level === 'go'      ? 'bg-green-50 border-green-100'   :
                            'bg-gray-50 border-gray-100'
                        }`}>
                            <div className={`text-xs font-semibold leading-snug ${
                                soilAlert.level === 'urgent'  ? 'text-orange-700' :
                                soilAlert.level === 'warning' ? 'text-amber-700'  :
                                soilAlert.level === 'go'      ? 'text-green-700'  :
                                'text-gray-600'
                            }`}>{soilAlert.text}</div>
                        </div>
                    )}
                </div>
            </div>
        );
    };

    // ─── ActivitySelector ────────────────────────────────────────────────────────
    const ActivitySelector = ({ onSelectType, onCancel, currentUser }) => {
        const fb = window.__FIREBASE__ || {};
        const canPhoto = fb.configured && !!currentUser;
        return (
            <div className="animate-fade-in">
                <h2 className="text-xl font-bold mb-4">Select Activity Type</h2>
                <div className="grid grid-cols-2 gap-3">
                    {Object.entries(ACTIVITY_TYPES)
                        .filter(([key]) => key !== 'photo' || canPhoto)
                        .map(([key, type]) => {
                            const colors = ACTIVITY_COLORS[key] || ACTIVITY_COLORS.mowing;
                            return (
                                <button key={key} onClick={() => onSelectType(key)}
                                    className={`${colors.bg} border-2 p-4 rounded-xl shadow-md card-hover btn-press`}
                                    style={{borderColor: colors.hex + '4D'}}
                                    onMouseEnter={(e) => e.currentTarget.style.borderColor = colors.hex}
                                    onMouseLeave={(e) => e.currentTarget.style.borderColor = colors.hex + '4D'}>
                                    <div className="text-4xl mb-2">{type.icon}</div>
                                    <div className={`text-sm font-bold ${colors.text}`}>{type.name}</div>
                                </button>
                            );
                        })}
                </div>
                <button onClick={onCancel} className="mt-4 px-4 py-2 bg-gray-200 rounded-lg btn-press">Cancel</button>
            </div>
        );
    };

    // ─── ActivityForm ────────────────────────────────────────────────────────────
    const ActivityForm = ({ selectedActivityType, onSubmit, onCancel, currentUser }) => {
        const activityType = ACTIVITY_TYPES[selectedActivityType];
        const isPhotoLog = selectedActivityType === 'photo';
        const [localFormData, setLocalFormData] = useState({ date: new Date().toISOString().split('T')[0], notes: '', data: {} });
        const [photoPreview, setPhotoPreview] = useState(null);
        const [shareToGallery, setShareToGallery] = useState(false);
        const fb = window.__FIREBASE__ || {};
        const canUploadPhoto = fb.configured && !!currentUser;

        const handlePhotoChange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            setLocalFormData(prev => ({ ...prev, photoFile: file }));
            const url = URL.createObjectURL(file);
            setPhotoPreview(url);
        };

        const clearPhoto = () => {
            setLocalFormData(prev => ({ ...prev, photoFile: null }));
            if (photoPreview) URL.revokeObjectURL(photoPreview);
            setPhotoPreview(null);
            setShareToGallery(false);
        };

        const renderPhotoSection = (required) => (
            <div className="mb-4">
                <label className="block text-sm font-semibold mb-2">
                    📷 Photo {required
                        ? <span className="text-red-600 ml-1">*</span>
                        : <span className="text-xs font-normal text-gray-400">(Optional)</span>
                    }
                </label>
                {!canUploadPhoto ? (
                    <div className="flex items-center gap-2 p-3 bg-gray-50 border border-dashed border-gray-200 rounded-xl">
                        <span className="text-gray-400 text-sm">Sign in to attach photos to activities</span>
                    </div>
                ) : !localFormData.photoFile ? (
                    <label className="flex flex-col items-center justify-center w-full border-2 border-dashed border-gray-200 rounded-xl cursor-pointer transition-colors hover:border-[#367C2B] bg-gray-50"
                        style={{minHeight: required ? '140px' : '96px'}}>
                        <span className="text-3xl mb-1">📸</span>
                        <span className="text-sm text-gray-500 font-medium">Tap to add photo</span>
                        <span className="text-xs text-gray-400 mt-0.5">Camera or library</span>
                        <input type="file" accept="image/*" className="sr-only" onChange={handlePhotoChange} />
                    </label>
                ) : (
                    <div>
                        <div className="relative rounded-xl overflow-hidden mb-2" style={{maxHeight: required ? '280px' : '220px'}}>
                            <img src={photoPreview} alt="Preview" className="w-full object-cover rounded-xl" style={{maxHeight: required ? '280px' : '220px'}} />
                            <button type="button" onClick={clearPhoto}
                                className="absolute top-2 right-2 w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm shadow-md"
                                style={{background:'rgba(0,0,0,0.55)', color:'white', border:'none', cursor:'pointer'}}>
                                ✕
                            </button>
                        </div>
                        <label className="flex items-center gap-2.5 cursor-pointer select-none">
                            <input type="checkbox" checked={shareToGallery}
                                onChange={e => setShareToGallery(e.target.checked)}
                                className="w-4 h-4 rounded accent-[#367C2B]" />
                            <span className="text-sm text-gray-700">Share this photo in the community gallery</span>
                        </label>
                    </div>
                )}
            </div>
        );

        return (
            <div>
                <h2 className="text-2xl font-bold mb-6 flex items-center gap-3">
                    <span className="text-4xl">{activityType.icon}</span>{activityType.name}
                </h2>
                <form onSubmit={(e) => {
                    e.preventDefault();
                    if (isPhotoLog && !localFormData.photoFile) {
                        alert('Please add a photo before saving.');
                        return;
                    }
                    onSubmit({ ...localFormData, shareToGallery });
                }} className="bg-white rounded-lg shadow-lg p-6">
                    {isPhotoLog && renderPhotoSection(true)}
                    <div className="mb-4">
                        <label className="block text-sm font-semibold mb-2">Date</label>
                        <input type="date" required value={localFormData.date}
                            onChange={(e) => setLocalFormData({...localFormData, date: e.target.value})}
                            className="w-full px-4 py-2 border rounded-lg" />
                    </div>
                    {activityType.fields.map(field => (
                        <div key={field.name} className="mb-4">
                            <label className="block text-sm font-semibold mb-2">{field.label}{field.required && <span className="text-red-600 ml-1">*</span>}</label>
                            {field.type === 'treatment-category' ? (
                                <div className="grid grid-cols-2 gap-3">
                                    {Object.entries(TREATMENT_CATEGORIES).map(([key, cat]) => (
                                        <button key={key} type="button"
                                            onClick={() => setLocalFormData({...localFormData, data: {...localFormData.data, category: key, product: ''}})}
                                            className={`p-3 rounded-lg border-2 ${localFormData.data.category === key ? 'bg-[#367C2B] text-white' : 'bg-white'}`}>
                                            <div className="text-xl">{cat.icon}</div>
                                            <div className="text-sm">{cat.label}</div>
                                        </button>
                                    ))}
                                </div>
                            ) : field.type === 'treatment-product' ? (
                                localFormData.data.category ? (
                                    <div>
                                        <select onChange={(e) => setLocalFormData({...localFormData, data: {...localFormData.data, product: e.target.value}})}
                                            className="w-full px-4 py-2 border rounded-lg" required={field.required}>
                                            <option value="">Select...</option>
                                            {(TREATMENT_PRODUCTS[localFormData.data.category] || []).map(p => (
                                                <option key={p.id} value={p.name}>{p.name}</option>
                                            ))}
                                        </select>
                                        {(() => {
                                            const sp = (TREATMENT_PRODUCTS[localFormData.data.category] || []).find(p => p.name === localFormData.data.product);
                                            if (!sp || sp.id.endsWith('5')) return null;
                                            return (
                                                <div className="mt-2 p-3 bg-blue-50 border border-blue-200 rounded-lg">
                                                    <div className="text-xs font-bold text-blue-800 uppercase mb-2">Product Details</div>
                                                    <div className="grid grid-cols-2 gap-2">
                                                        {sp.activeIngredient && <div><div className="text-xs text-gray-500">Active Ingredient</div><div className="text-xs font-semibold text-gray-800">{sp.activeIngredient}</div></div>}
                                                        {sp.rate && <div><div className="text-xs text-gray-500">Application Rate</div><div className="text-xs font-semibold text-gray-800">{sp.rate}</div></div>}
                                                        {sp.timing && <div><div className="text-xs text-gray-500">Timing</div><div className="text-xs font-semibold text-gray-800">{sp.timing}</div></div>}
                                                        {sp.target && <div><div className="text-xs text-gray-500">Target</div><div className="text-xs font-semibold text-gray-800">{sp.target}</div></div>}
                                                    </div>
                                                    {sp.notes && <div className="mt-2 text-xs text-gray-600 italic">{sp.notes}</div>}
                                                </div>
                                            );
                                        })()}
                                    </div>
                                ) : <div className="p-4 bg-yellow-50 border rounded">Select category first</div>
                            ) : field.type === 'product-select' ? (() => {
                                let products = PRODUCT_DATABASE[field.productType] || [];
                                if (field.filterBy && localFormData.data[field.filterBy]) {
                                    const filterVal = localFormData.data[field.filterBy];
                                    products = products.filter(p => p[field.filterProp] === filterVal || p.id.includes('-other'));
                                }
                                return (
                                    <select onChange={(e) => setLocalFormData({...localFormData, data: {...localFormData.data, [field.name]: e.target.value}})}
                                        className="w-full px-4 py-2 border rounded-lg">
                                        <option value="">Select...</option>
                                        {products.map(p => <option key={p.id} value={p.name}>{p.brand} - {p.name} {p.deck ? `(${p.deck})` : ''}</option>)}
                                    </select>
                                );
                            })()
                            : field.type === 'select' ? (
                                <select onChange={(e) => setLocalFormData({...localFormData, data: {...localFormData.data, [field.name]: e.target.value}})}
                                    className="w-full px-4 py-2 border rounded-lg">
                                    <option value="">Select...</option>
                                    {field.options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                </select>
                            ) : (
                                <input type={field.type} placeholder={field.placeholder}
                                    value={localFormData.data[field.name] || ''}
                                    onChange={(e) => setLocalFormData({...localFormData, data: {...localFormData.data, [field.name]: e.target.value}})}
                                    className="w-full px-4 py-2 border rounded-lg" />
                            )}
                        </div>
                    ))}
                    <div className="mb-4">
                        <label className="block text-sm font-semibold mb-2">Notes (Optional)</label>
                        <textarea value={localFormData.notes} onChange={(e) => setLocalFormData({...localFormData, notes: e.target.value})} rows="3" className="w-full px-4 py-2 border rounded-lg" />
                    </div>
                    {/* ── Photo Upload ── */}
                    {!isPhotoLog && renderPhotoSection(false)}
                    {/* PREMIUM_FEATURE: cost tracking — available to all users now; gated to premium subscribers in a future release */}
                    <div className="mb-4">
                        <label className="block text-sm font-semibold mb-2">Cost <span className="text-xs font-normal text-gray-400">(Optional — track product &amp; service spend)</span></label>
                        <div className="relative">
                            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 font-semibold">$</span>
                            <input type="number" min="0" step="0.01" placeholder="0.00"
                                value={localFormData.cost || ''}
                                onChange={(e) => setLocalFormData({...localFormData, cost: e.target.value})}
                                className="w-full pl-7 pr-4 py-2 border rounded-lg" />
                        </div>
                    </div>
                    <div className="flex gap-4">
                        <button type="submit" className="flex-1 px-6 py-3 bg-[#367C2B] text-white rounded-lg font-semibold">Save Activity</button>
                        <button type="button" onClick={onCancel} className="px-6 py-3 bg-gray-200 rounded-lg">Cancel</button>
                    </div>
                </form>
            </div>
        );
    };

    // ─── LawnProfile ─────────────────────────────────────────────────────────────
    const LawnProfile = ({ profileFormData, profileEditing, lawnProfile, weather, zipLookupLoading, zipLookupError, onZipLookup, onSave, onEditToggle, onNavigate }) => {
        const [localForm, setLocalForm] = useState({...profileFormData});
        useEffect(() => {
            setLocalForm(prev => ({...prev, zone: profileFormData.zone, lat: profileFormData.lat, lon: profileFormData.lon, zipCode: profileFormData.zipCode}));
        }, [profileFormData.zone]);
        const save = async () => {
            const toSave = {...localForm};
            await onSave(toSave);
        };
        const grassInfo = GRASS_INFO[localForm.specificGrass];
        const zoneInfo = ZONE_INFO[localForm.zone];

        const getCurrentMonthTasks = () => {
            if (!localForm.specificGrass || !localForm.zone) return null;
            const programKey = GRASS_KEY_MAP[localForm.specificGrass] + '_zone' + getParentZone(localForm.zone);
            const program = typeof grassPrograms !== 'undefined' ? grassPrograms[programKey] : null;
            if (!program || !program.schedule) return null;
            const currentMonth = MONTH_NAMES[new Date().getMonth()];
            return program.schedule.find(s => {
                if (s.month === currentMonth) return true;
                if (s.month && s.month.includes('-')) {
                    const parts = s.month.split('-');
                    const startIdx = MONTH_NAMES.indexOf(parts[0].trim()), endIdx = MONTH_NAMES.indexOf(parts[1].trim()), curIdx = MONTH_NAMES.indexOf(currentMonth);
                    if (startIdx >= 0 && endIdx >= 0 && curIdx >= startIdx && curIdx <= endIdx) return true;
                }
                return false;
            });
        };
        const currentTasks = getCurrentMonthTasks();

        if (profileEditing) {
            return (
                <div>
                    <h2 className="text-2xl font-bold mb-6">Lawn Profile</h2>
                    <div className="bg-white rounded-lg shadow p-4 space-y-4">
                        <div>
                            <label className="block text-sm font-medium mb-2">Lawn Size (sq ft)</label>
                            <input type="number" value={localForm.lawnSize} onChange={(e) => setLocalForm({...localForm, lawnSize: e.target.value})} placeholder="5000" className="w-full px-4 py-3 border-2 rounded-lg" />
                        </div>
                        <div>
                            <label className="block text-sm font-medium mb-2">Find Zone by Zip Code</label>
                            <div className="flex gap-2">
                                <input type="text" inputMode="numeric" maxLength={5} value={localForm.zipCode || ''} onChange={(e) => setLocalForm({...localForm, zipCode: e.target.value})}
                                    onKeyDown={(e) => { if (e.key === 'Enter') onZipLookup(localForm.zipCode); }} placeholder="e.g. 43201" className="flex-1 px-4 py-3 border-2 rounded-lg" />
                                <button type="button" onClick={() => onZipLookup(localForm.zipCode)} disabled={zipLookupLoading}
                                    className="px-4 py-3 bg-[#367C2B] text-white rounded-lg font-semibold text-sm disabled:opacity-60 whitespace-nowrap">
                                    {zipLookupLoading ? 'Looking up...' : 'Look Up'}
                                </button>
                            </div>
                            {zipLookupError && <div className="mt-1 text-xs text-red-600">{zipLookupError}</div>}
                            {localForm.zone && ZONE_INFO[localForm.zone] && !zipLookupError && <div className="mt-1 text-xs text-[#367C2B] font-medium">Zone {localForm.zone.toUpperCase()} detected — {ZONE_INFO[localForm.zone].temp}</div>}
                        </div>
                        <div>
                            <label className="block text-sm font-medium mb-2">USDA Climate Zone <span className="font-normal text-gray-500">(or select manually)</span></label>
                            <select value={localForm.zone} onChange={(e) => setLocalForm({...localForm, zone: e.target.value})} className="w-full px-4 py-3 border-2 rounded-lg">
                                <option value="">Select...</option>
                                <optgroup label="Zone 4 — Northern Cold (-30 to -20°F)"><option value="4a">Zone 4a (-30 to -25°F)</option><option value="4b">Zone 4b (-25 to -20°F)</option></optgroup>
                                <optgroup label="Zone 5 — Northern (-20 to -10°F)"><option value="5a">Zone 5a (-20 to -15°F)</option><option value="5b">Zone 5b (-15 to -10°F)</option></optgroup>
                                <optgroup label="Zone 6 — Moderate (-10 to 0°F)"><option value="6a">Zone 6a (-10 to -5°F)</option><option value="6b">Zone 6b (-5 to 0°F)</option></optgroup>
                                <optgroup label="Zone 7 — Transition Zone (0 to 10°F)"><option value="7a">Zone 7a (0 to 5°F)</option><option value="7b">Zone 7b (5 to 10°F)</option></optgroup>
                                <optgroup label="Zone 8 — Southern (10 to 20°F)"><option value="8a">Zone 8a (10 to 15°F)</option><option value="8b">Zone 8b (15 to 20°F)</option></optgroup>
                                <optgroup label="Zone 9 — Deep South / Gulf (20 to 30°F)"><option value="9a">Zone 9a (20 to 25°F)</option><option value="9b">Zone 9b (25 to 30°F)</option></optgroup>
                            </select>
                        </div>
                        <div>
                            <label className="block text-sm font-medium mb-2">Grass Type</label>
                            <select value={localForm.specificGrass} onChange={(e) => setLocalForm({...localForm, specificGrass: e.target.value})} className="w-full px-4 py-3 border-2 rounded-lg">
                                <option value="">Select...</option>
                                <optgroup label="Cool Season"><option value="tall-fescue">Tall Fescue</option><option value="kentucky-bluegrass">Kentucky Bluegrass</option><option value="perennial-ryegrass">Perennial Ryegrass</option><option value="fine-fescue">Fine Fescue</option></optgroup>
                                <optgroup label="Warm Season"><option value="bermuda">Bermudagrass</option><option value="zoysia">Zoysiagrass</option><option value="st-augustine">St. Augustinegrass</option><option value="centipede">Centipedegrass</option><option value="bahia">Bahiagrass</option></optgroup>
                                <optgroup label="Native / Low-Input"><option value="buffalograss">Buffalograss</option></optgroup>
                                <optgroup label="Blends / Mixed Seed"><option value="sun-shade-mix">Sun &amp; Shade Mix</option><option value="dense-shade-mix">Dense Shade Mix</option><option value="tall-fescue-blend">Tall Fescue Blend</option></optgroup>
                            </select>
                            {grassInfo && grassInfo.blendBrands && (
                                <div className="mt-2 bg-blue-50 border border-blue-200 rounded-lg p-3">
                                    <div className="text-xs font-bold text-blue-800 mb-2">🏷️ Common brand examples for this blend:</div>
                                    <ul className="space-y-1">
                                        {grassInfo.blendBrands.map((b, i) => (
                                            <li key={i} className="text-xs text-blue-700"><span className="font-semibold">{b.brand} — {b.product}</span><span className="text-blue-500"> ({b.note})</span></li>
                                        ))}
                                    </ul>
                                </div>
                            )}
                        </div>
                        <button onClick={save} className="w-full py-4 bg-[#367C2B] text-white rounded-xl font-bold text-lg">💾 Save Profile</button>
                    </div>
                </div>
            );
        }

        return (
            <div className="space-y-4">
                <div className="flex items-center justify-between mb-2">
                    <h2 className="text-2xl font-bold">My Yard</h2>
                    <button onClick={() => onEditToggle(true)} className="px-4 py-2 text-sm font-semibold text-[#367C2B] border-2 border-[#367C2B] rounded-lg hover:bg-[#367C2B]/10">Edit Profile</button>
                </div>
                <div className="bg-gradient-to-r from-[#367C2B] to-[#4a9c3a] rounded-xl p-5 text-white shadow-lg">
                    <div className="text-lg font-bold">{grassInfo ? grassInfo.name : localForm.specificGrass}</div>
                    <div className="text-sm opacity-90 mt-1">
                        {grassInfo && <span>{grassInfo.season}</span>}
                        {zoneInfo && <span> · Zone {localForm.zone} ({zoneInfo.climate}) <CitationBadge sources={[{ name: 'USDA Plant Hardiness Zone Map', url: 'https://planthardiness.ars.usda.gov/', topic: 'Official zone classifications' }]} label="USDA Zone" /></span>}
                        {localForm.lawnSize && <span> · {Number(localForm.lawnSize).toLocaleString()} sq ft</span>}
                    </div>
                    {grassInfo && <div className="mt-3 text-sm opacity-90 italic">"{grassInfo.bestFeature}"</div>}
                </div>
                {(() => {
                    const zoneNote = grassInfo && grassInfo.zoneNotes && (grassInfo.zoneNotes[localForm.zone] || grassInfo.zoneNotes[getParentZone(localForm.zone)]);
                    if (!zoneNote) return null;
                    const noteLower = zoneNote.toLowerCase();
                    const colorClass = noteLower.includes('not recommended') || noteLower.includes('not viable') ? 'bg-red-50 border-red-500' : noteLower.includes('challenging') || noteLower.includes('difficult') || noteLower.includes('marginal') ? 'bg-yellow-50 border-yellow-500' : 'bg-[#e8f5e9] border-[#367C2B]';
                    return (
                        <div className={`rounded-xl p-4 border-l-4 ${colorClass}`}>
                            <div className="font-bold text-sm mb-1">Zone {localForm.zone} Compatibility <CitationBadge sources={grassInfo.sources} label="Zone adaptation" /></div>
                            <div className="text-sm text-gray-700">{zoneNote}</div>
                        </div>
                    );
                })()}
                {grassInfo && (
                    <div className="bg-white rounded-xl shadow-lg p-4">
                        <h3 className="text-sm font-bold text-[#367C2B] uppercase mb-3">Quick Reference <CitationBadge sources={grassInfo.sources} label="Grass care specs" /></h3>
                        <div className="grid grid-cols-2 gap-3">
                            <div className="bg-gray-50 rounded-lg p-3 text-center"><div className="text-xs text-gray-500 mb-1">Mow Height</div><div className="text-sm font-bold text-gray-800">{grassInfo.mowHeight}</div><div className="text-xs text-gray-400 mt-1">Summer: {grassInfo.mowHeightSummer}</div></div>
                            <div className="bg-gray-50 rounded-lg p-3 text-center"><div className="text-xs text-gray-500 mb-1">Water / Week</div><div className="text-sm font-bold text-gray-800">{grassInfo.waterPerWeek}</div></div>
                            <div className="bg-gray-50 rounded-lg p-3 text-center"><div className="text-xs text-gray-500 mb-1">Sun Needs</div><div className="text-sm font-bold text-gray-800">{grassInfo.sunNeeds}</div></div>
                            <div className="bg-gray-50 rounded-lg p-3 text-center"><div className="text-xs text-gray-500 mb-1">Fertilizer / Year</div><div className="text-sm font-bold text-gray-800">{grassInfo.fertPerYear}</div></div>
                            <div className="bg-gray-50 rounded-lg p-3 text-center"><div className="text-xs text-gray-500 mb-1">Ideal Soil pH</div><div className="text-sm font-bold text-gray-800">{grassInfo.idealSoilPH}</div></div>
                            <div className="bg-gray-50 rounded-lg p-3 text-center"><div className="text-xs text-gray-500 mb-1">Peak Growth</div><div className="text-sm font-bold text-gray-800">{grassInfo.peakGrowth}</div></div>
                            {grassInfo.idealSoilTemp && <div className="bg-gray-50 rounded-lg p-3 text-center col-span-2"><div className="text-xs text-gray-500 mb-1">Ideal Soil Temp</div><div className="text-sm font-bold text-gray-800">{grassInfo.idealSoilTemp}</div></div>}
                        </div>
                        <div className="mt-3 p-3 bg-blue-50 rounded-lg"><div className="text-xs text-blue-600 font-semibold mb-1">Dormancy</div><div className="text-sm text-gray-700">{grassInfo.dormancy}</div></div>
                    </div>
                )}
                {currentTasks && weather && <ForecastImpactCard tasks={currentTasks.tasks} weather={weather} />}
                {currentTasks && (
                    <div className="bg-white rounded-xl shadow-lg p-4">
                        <h3 className="text-sm font-bold text-[#367C2B] uppercase mb-1">This Month's Tasks <CitationBadge sources={grassInfo ? grassInfo.sources : null} label="Monthly program" /></h3>
                        <div className="text-xs text-gray-500 mb-3">{currentTasks.month}{currentTasks.importance ? ` — ${currentTasks.importance}` : ''}</div>
                        <ul className="space-y-3">
                            {currentTasks.tasks.map((task, i) => {
                                const ws = getTaskWeatherStatus(task, weather);
                                const badgeStyle = ws ? ws.status === 'go' ? 'bg-[#e8f5e9] text-[#367C2B]' : ws.status === 'caution' ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-700' : null;
                                const badgeLabel = ws ? ws.status === 'go' ? '✓ Good timing' : ws.status === 'caution' ? '⚠ Note' : '✕ Hold' : null;
                                return (
                                    <li key={i} className="flex items-start gap-2 text-sm text-gray-700">
                                        <span className="text-[#367C2B] mt-0.5 font-bold shrink-0">·</span>
                                        <div className="flex-1"><span>{task}</span>{ws && <span className={`ml-2 text-xs font-semibold px-1.5 py-0.5 rounded ${badgeStyle}`}>{badgeLabel}</span>}</div>
                                    </li>
                                );
                            })}
                        </ul>
                    </div>
                )}
                {grassInfo && weather && <WaterDeficitCard grassInfo={grassInfo} weather={weather} />}
                <div className="bg-white rounded-xl shadow-lg p-4">
                    <h3 className="text-sm font-bold text-[#367C2B] uppercase mb-2">Lawn Care Program</h3>
                    <p className="text-sm text-gray-600 mb-3">View your full personalized year-round care schedule with monthly tasks, treatments, and timing.</p>
                    <button onClick={() => onNavigate('gameplan')} className="w-full py-3 px-4 bg-[#367C2B] text-white rounded-xl font-bold text-sm hover:bg-[#2d6323] btn-press">
                        📅 Go to Lawn Care Program →
                    </button>
                </div>
                {grassInfo && grassInfo.keyTips && (
                    <div className="bg-white rounded-xl shadow-lg p-4">
                        <h3 className="text-sm font-bold text-[#367C2B] uppercase mb-3">Key Tips <CitationBadge sources={grassInfo.sources} label="Care tips" /></h3>
                        <ul className="space-y-2">{grassInfo.keyTips.map((tip, i) => <li key={i} className="flex items-start gap-2 text-sm text-gray-700"><span className="text-[#367C2B] mt-0.5">💡</span><span>{tip}</span></li>)}</ul>
                    </div>
                )}
                {grassInfo && grassInfo.commonIssues && (
                    <div className="bg-white rounded-xl shadow-lg p-4">
                        <h3 className="text-sm font-bold text-orange-600 uppercase mb-3">Watch Out For <CitationBadge sources={grassInfo.sources} label="Common issues" /></h3>
                        <ul className="space-y-2">{grassInfo.commonIssues.map((issue, i) => <li key={i} className="flex items-start gap-2 text-sm text-gray-700"><span className="text-orange-500 mt-0.5">⚠️</span><span>{issue}</span></li>)}</ul>
                    </div>
                )}
                {grassInfo && grassInfo.blendBrands && (
                    <div className="bg-blue-50 rounded-xl p-4 border border-blue-200">
                        <h3 className="text-sm font-bold text-blue-800 uppercase mb-3">🏷️ Common Brand Examples</h3>
                        <p className="text-xs text-blue-600 mb-3">These retail products typically contain this blend type. Use as a reference when buying seed for overseeding.</p>
                        <ul className="space-y-2">
                            {grassInfo.blendBrands.map((b, i) => (
                                <li key={i} className="bg-white rounded-lg p-2 border border-blue-100">
                                    <div className="text-sm font-semibold text-gray-800">{b.brand} — {b.product}</div>
                                    <div className="text-xs text-gray-500 mt-0.5">{b.note}</div>
                                </li>
                            ))}
                        </ul>
                    </div>
                )}
                {grassInfo && grassInfo.sources && grassInfo.sources.length > 0 && (
                    <div className="bg-white rounded-xl shadow-sm p-4 border border-gray-100">
                        <div className="text-xs font-bold text-gray-500 uppercase mb-2">📚 Research Sources</div>
                        <div className="space-y-1">
                            {grassInfo.sources.map((s, i) => (
                                <div key={i} className="flex items-start gap-2 text-xs">
                                    <span className="text-[#367C2B] mt-0.5">·</span>
                                    {s.url ? <a href={s.url} target="_blank" rel="noopener noreferrer" className="text-[#367C2B] hover:text-[#2d6323] underline font-semibold">{s.name}</a> : <span className="text-gray-600 font-semibold">{s.name}</span>}
                                    {s.topic && <span className="text-gray-400">— {s.topic}</span>}
