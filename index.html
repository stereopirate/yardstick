<script>
// ── compressImage: client-side photo compression via Canvas ──────────────────
// Resizes to maxDim (default 1200px) and encodes as JPEG at given quality.
// Returns a Blob ready for Firebase Storage upload.
window.compressImage = function(file, maxDim, quality) {
    maxDim = maxDim || 1200;
    quality = quality || 0.82;
    return new Promise(function(resolve, reject) {
        var reader = new FileReader();
        reader.onerror = reject;
        reader.onload = function(e) {
            var img = new Image();
            img.onerror = reject;
            img.onload = function() {
                var canvas = document.createElement('canvas');
                var w = img.width, h = img.height;
                if (w > maxDim || h > maxDim) {
                    if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
                    else { w = Math.round(w * maxDim / h); h = maxDim; }
                }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                canvas.toBlob(function(blob) {
                    blob ? resolve(blob) : reject(new Error('Canvas toBlob failed'));
                }, 'image/jpeg', quality);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
};
</script>

<script type="text/babel">
// ─── ActivityDetails Component ────────────────────────────────────────────────
window.ActivityDetails = ({ activity }) => {
    const activityType = ACTIVITY_TYPES[activity.type];
    if (!activityType || !activity.data) return null;
    const fields = activityType.fields || [];
    const details = fields.filter(f => activity.data[f.name]).map(f => {
        let value = activity.data[f.name];
        if (f.name === 'category' && TREATMENT_CATEGORIES[value]) {
            value = TREATMENT_CATEGORIES[value].icon + ' ' + TREATMENT_CATEGORIES[value].label;
        }
        return { label: f.label, value };
    });
    if (details.length === 0 && !activity.notes) return null;
    return (
        <div className="mt-3 pt-3 border-t border-gray-200">
            {details.length > 0 && (
                <div className="grid grid-cols-2 gap-x-4 gap-y-2">
                    {details.map(d => (
                        <div key={d.label}>
                            <div className="text-xs text-gray-500 uppercase tracking-wide">{d.label}</div>
                            <div className="text-sm font-medium text-gray-800">{d.value}</div>
                        </div>
                    ))}
                </div>
            )}
            {activity.cost > 0 && (
                <div className="mt-2 flex items-center gap-1.5">
                    <div className="text-xs text-gray-500 uppercase tracking-wide">Cost</div>
                    <div className="text-sm font-semibold text-gray-800">${parseFloat(activity.cost).toFixed(2)}</div>
                </div>
            )}
            {activity.notes && (
                <div className="mt-2">
                    <div className="text-xs text-gray-500 uppercase tracking-wide">Notes</div>
                    <div className="text-sm text-gray-700">{activity.notes}</div>
                </div>
            )}
        </div>
    );
};
</script>

<script type="text/babel">
// ─── GalleryView Component ────────────────────────────────────────────────────
(function () {
    const { useState, useEffect } = React;

    window.GalleryView = ({ currentUser, onSignIn }) => {
        const [photos, setPhotos]           = useState([]);
        const [loading, setLoading]         = useState(true);
        const [myPhotosOnly, setMyPhotosOnly] = useState(false);
        const [selectedPhoto, setSelectedPhoto] = useState(null);
        const [deleteTarget, setDeleteTarget] = useState(null);
        const [deleting, setDeleting]       = useState(false);
        const fb = window.__FIREBASE__ || {};

        useEffect(() => {
            if (!fb.configured || !currentUser) { setLoading(false); return; }
            const { db, collection, getDocs, query, orderBy, limit } = fb;
            getDocs(query(collection(db, 'gallery'), orderBy('createdAt', 'desc'), limit(100)))
                .then(snap => {
                    setPhotos(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    setLoading(false);
                })
                .catch(e => { console.error('Gallery load:', e); setLoading(false); });
        }, [currentUser]);

        const handleDelete = async (photo) => {
            if (!window.confirm('Remove this photo from the gallery?')) return;
            setDeleting(true);
            try {
                const { db, doc, deleteDoc } = fb;
                await deleteDoc(doc(db, 'gallery', photo.id));
                setPhotos(prev => prev.filter(p => p.id !== photo.id));
                if (selectedPhoto && selectedPhoto.id === photo.id) setSelectedPhoto(null);
            } catch(e) { console.error('Delete failed:', e); }
            setDeleting(false);
        };

        const displayed = myPhotosOnly && currentUser
            ? photos.filter(p => p.userId === currentUser.uid)
            : photos;

        if (!fb.configured) return (
            <div className="animate-fade-in">
                <h2 className="text-2xl font-bold mb-2">Lawn Gallery</h2>
                <div className="bg-amber-50 border border-amber-200 rounded-xl p-6 text-center mt-4">
                    <div className="text-3xl mb-2">🔧</div>
                    <div className="font-bold text-amber-800">Firebase not configured</div>
                    <div className="text-sm text-amber-600 mt-1">The gallery requires Firebase Storage. See FIREBASE_SETUP.md.</div>
                </div>
            </div>
        );

        if (!currentUser) return (
            <div className="animate-fade-in">
                <h2 className="text-2xl font-bold mb-2">Lawn Gallery</h2>
                <p className="text-sm text-gray-500 mb-6">Share and browse lawn progress photos from the community</p>

                    <button onClick={onSignIn}

                        Sign In / Create Account
                    </button>
                </div>

                                        <div className="font-bold text-gray-800 flex items-center gap-2">
                                            {window.ACTIVITY_TYPES && window.ACTIVITY_TYPES[selectedPhoto.activityType]
                                                ? window.ACTIVITY_TYPES[selectedPhoto.activityType].icon + ' ' + window.ACTIVITY_TYPES[selectedPhoto.activityType].name
                                                : selectedPhoto.activityType}
                                        </div>
                                        <div className="text-sm text-gray-500">
                                            {selectedPhoto.userName} · {new Date(selectedPhoto.date).toLocaleDateString()}
                                        </div>
                                        {(selectedPhoto.grassName || selectedPhoto.zone || selectedPhoto.lawnSize) && (
                                            <div className="flex flex-wrap gap-1.5 mt-1.5">
                                                {selectedPhoto.grassName && (
                                                    <span className="text-xs bg-[#EBF5E6] text-[#367C2B] font-semibold px-2 py-0.5 rounded-full">
                                                        🌿 {selectedPhoto.grassName}
                                                    </span>
                                                )}
                                                {selectedPhoto.zone && (
                                                    <span className="text-xs bg-[#EBF5E6] text-[#367C2B] font-semibold px-2 py-0.5 rounded-full">
                                                        Zone {selectedPhoto.zone}
                                                    </span>
                                                )}
                                                {selectedPhoto.lawnSize && (
                                                    <span className="text-xs bg-gray-100 text-gray-600 font-semibold px-2 py-0.5 rounded-full">
                                                        {Number(selectedPhoto.lawnSize).toLocaleString()} sq ft
                                                    </span>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                    {selectedPhoto.userId === currentUser.uid && (
                                        <button onClick={() => handleDelete(selectedPhoto)} disabled={deleting}
                                            className="text-xs text-red-500 font-semibold px-3 py-1.5 rounded-lg border border-red-200 hover:bg-red-50 transition">
                                            {deleting ? 'Removing…' : 'Remove'}
                                        </button>
                                    )}
                                </div>
                                {selectedPhoto.caption && (
                                    <p className="text-sm text-gray-600 mb-3">{selectedPhoto.caption}</p>
                                )}
                                <button onClick={() => setSelectedPhoto(null)}
                                    className="w-full py-3 rounded-xl font-semibold text-sm bg-gray-100 text-gray-700">
                                    Close
                                </button>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    };
})();
</script>

<script type="text/babel">

<script type="text/babel">
// ─── Dashboard Component ──────────────────────────────────────────────────────
(function () {
    const { useState } = React;
    const ActivityDetails = window.ActivityDetails;
    window.Dashboard = ({ activities, statsView, onStatsViewChange, weather, lawnProfile, onNavigate }) => {
        const [expandedRecentId, setExpandedRecentId] = useState(null);
        const now = new Date();
        const filtered = statsView === 'year'
            ? activities.filter(a => new Date(a.date).getFullYear() === now.getFullYear())
            : statsView === 'season'
                ? activities.filter(a => { const year = now.getFullYear(); const d = new Date(a.date); return d >= new Date(year, 3, 1) && d <= new Date(year, 9, 31); })
                : activities;
        const stats = {
            total: filtered.length,
            mowing: filtered.filter(a => a.type === 'mowing').length,
            fertilizer: filtered.filter(a => a.type === 'fertilizer').length,
            watering: filtered.filter(a => a.type === 'watering').length,
            seeding: filtered.filter(a => a.type === 'seeding').length,
            trimming: filtered.filter(a => a.type === 'trimming').length,
            aeration: filtered.filter(a => a.type === 'aeration').length,
            treatment: filtered.filter(a => a.type === 'treatment').length,
            maintenance: filtered.filter(a => a.type === 'maintenance').length,
            totalHours: filtered.reduce((sum, a) => sum + (parseFloat(a.data?.duration) || 0), 0) / 60,
            totalSpend: filtered.reduce((sum, a) => sum + (a.cost > 0 ? a.cost : 0), 0)
        };
        // Water budget: logged irrigation (filtered period) + rainfall (past 7 days via weather)
        const week7Ago = new Date(now); week7Ago.setDate(week7Ago.getDate() - 7);
        const loggedIrrigThisWeek = activities
            .filter(a => a.type === 'watering' && new Date(a.date) >= week7Ago)
            .reduce((sum, a) => sum + (parseFloat(a.data?.amount) || 0), 0);
        const loggedIrrigFiltered = Math.round(
            filtered.filter(a => a.type === 'watering').reduce((sum, a) => sum + (parseFloat(a.data?.amount) || 0), 0) * 100
        ) / 100;
        const rainThisWeek = weather ? (weather.rainfall || 0) : 0;
        const et0Target = weather ? (weather.et0Past7 || 1.25) : 1.25;
        const totalWaterThisWeek = Math.round((loggedIrrigThisWeek + rainThisWeek) * 100) / 100;
        const waterPct = Math.min(100, Math.round((totalWaterThisWeek / et0Target) * 100));
        const waterDeficit = Math.max(0, Math.round((et0Target - totalWaterThisWeek) * 100) / 100);
        const monthlyData = [];
        for (let i = 5; i >= 0; i--) {
            const month = new Date(now.getFullYear(), now.getMonth() - i, 1);
            const count = filtered.filter(a => { const d = new Date(a.date); return d.getMonth() === month.getMonth() && d.getFullYear() === month.getFullYear(); }).length;
            monthlyData.push({ month: month.toLocaleDateString('en', { month: 'short' }), count });
        }
        const recent = [...filtered].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 3);
        const breakdownItems = [
            { type: 'mowing', label: 'Mowing', count: stats.mowing },
            { type: 'fertilizer', label: 'Fertilizer', count: stats.fertilizer },
            { type: 'watering', label: 'Watering', count: stats.watering },
            { type: 'seeding', label: 'Seeding', count: stats.seeding },
            { type: 'aeration', label: 'Aeration', count: stats.aeration },
            { type: 'treatment', label: 'Treatments', count: stats.treatment },
            { type: 'maintenance', label: 'Maintenance', count: stats.maintenance }
        ];
        const maxBreakdown = Math.max(...breakdownItems.map(b => b.count)) || 1;
        const maxMonthly = Math.max(...monthlyData.map(d => d.count)) || 1;
        const profileIncomplete = !lawnProfile || !lawnProfile.specificGrass || !lawnProfile.zipCode;
        return (
            <div className="animate-fade-in">
                {profileIncomplete && onNavigate && (
                    <div className="flex items-start gap-3 rounded-xl p-4 mb-4" style={{background:'var(--ys-green-600)'}}>
                        <span className="text-xl flex-shrink-0">👋</span>
                        <div className="flex-1 min-w-0">
                            <div className="font-bold text-white text-sm leading-snug">Welcome to Yardstick</div>
                            <div className="text-xs mt-0.5" style={{color:'rgba(255,255,255,0.85)'}}>Set up your lawn profile to get personalized recommendations</div>
                        </div>
                        <button
                            onClick={() => onNavigate('profile')}
                            className="flex-shrink-0 text-xs font-bold px-3 py-2 rounded-lg btn-press"
                            style={{background:'rgba(255,255,255,0.2)', color:'white', border:'1px solid rgba(255,255,255,0.35)'}}
                        >
                            Set Up →
                        </button>
                    </div>
                )}
                <h2 className="text-2xl font-bold mb-4">📊 Dashboard</h2>
                <div className="flex gap-2 bg-gray-100 p-1 rounded-lg mb-4">
                    {[{key:'year',label:'This Year'},{key:'season',label:'Season'},{key:'all',label:'All Time'}].map(({key,label}) => (
                        <button key={key} onClick={() => onStatsViewChange(key)} className={`flex-1 py-2 px-4 rounded-md text-sm font-semibold transition btn-press ${statsView === key ? 'bg-[#367C2B] text-white shadow' : 'text-gray-600'}`}>{label}</button>
                    ))}
                </div>
                <div className="grid grid-cols-4 gap-2 mb-2">
                    <div className="bg-white rounded-xl p-3 shadow-md text-center border-t-2 border-[#367C2B]"><div className="text-2xl font-bold text-[#367C2B]">{stats.total}</div><div className="text-xs text-gray-500">Total</div></div>
                    <div className="bg-white rounded-xl p-3 shadow-md text-center border-t-2 border-[#367C2B]"><div className="text-2xl font-bold text-[#367C2B]">{stats.mowing}</div><div className="text-xs text-gray-500">Mows</div></div>
                    <div className="bg-white rounded-xl p-3 shadow-md text-center border-t-2 border-[#F97316]"><div className="text-2xl font-bold text-[#F97316]">{stats.fertilizer}</div><div className="text-xs text-gray-500">Feeds</div></div>
                    <div className="bg-white rounded-xl p-3 shadow-md text-center border-t-2 border-[#3B82F6]"><div className="text-2xl font-bold text-[#3B82F6]">{stats.totalHours.toFixed(1)}</div><div className="text-xs text-gray-500">Hours</div></div>
                </div>
                {/* Water Budget Card */}
                {weather && (
                    <div className="bg-blue-50 rounded-xl p-4 shadow-md mb-4 border border-blue-100">
                        <div className="flex items-center justify-between mb-3">
                            <h3 className="text-sm font-bold text-blue-800">💧 Total Water — Last 7 Days</h3>
                            <span className="text-xs text-blue-400">{et0Target}" ET0 target</span>
                        </div>
                        <div className="space-y-2 mb-3">
                            {[
                                { label: '🌧️ Rainfall', value: rainThisWeek, color: '#60A5FA' },
                                { label: '💧 Irrigated', value: Math.round(loggedIrrigThisWeek * 100) / 100, color: '#2563EB' },
                            ].map(({ label, value, color }) => (
                                <div key={label} className="flex items-center gap-2">
                                    <span className="w-22 text-xs text-blue-700 font-medium flex-shrink-0" style={{width:'5.5rem'}}>{label}</span>
                                    <div className="flex-1 bg-blue-100 rounded-full h-6 relative overflow-hidden">
                                        <div className="h-full rounded-full transition-all duration-500" style={{width:`${Math.min(100,(value/et0Target)*100)}%`, backgroundColor: color, minWidth: value > 0 ? '24px' : '0'}} />
                                        <div className="absolute inset-0 flex items-center justify-end pr-2">
                                            <span className="text-xs font-bold" style={{color: value > 0 ? '#fff' : '#93C5FD'}}>{value > 0 ? value + '"' : 'none'}</span>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="border-t border-blue-200 pt-2">
                            <div className="flex items-center gap-2 mb-1.5">
                                <span className="text-xs font-bold text-blue-900" style={{width:'5.5rem'}}>Total</span>
                                <div className="flex-1 bg-blue-100 rounded-full h-7 relative overflow-hidden">
                                    <div className="h-full rounded-full transition-all duration-500" style={{width:`${waterPct}%`, backgroundColor: waterPct >= 100 ? '#367C2B' : waterPct >= 70 ? '#F59E0B' : '#EF4444', minWidth: totalWaterThisWeek > 0 ? '28px' : '0'}} />
                                    <div className="absolute inset-0 flex items-center justify-end pr-2">
                                        <span className="text-xs font-bold text-white">{totalWaterThisWeek}" / {et0Target}"</span>
                                    </div>
                                </div>
                            </div>
                            <p className="text-xs text-blue-700">
                                {waterPct >= 100
                                    ? '✅ Weekly water need covered — skip supplemental irrigation'
                                    : `⚠️ ~${waterDeficit}" deficit — consider irrigating`}
                            </p>
                            {loggedIrrigThisWeek === 0 && <p className="text-xs text-blue-400 mt-1">💡 Log watering with an "Amount (inches)" to track irrigation here</p>}
                        </div>
                        {loggedIrrigFiltered > 0 && statsView !== 'all' && (
                            <div className="mt-2 pt-2 border-t border-blue-200 flex items-center justify-between">
                                <span className="text-xs text-blue-600">Total irrigated ({statsView === 'year' ? 'this year' : 'this season'})</span>
                                <span className="text-xs font-bold text-blue-800">{loggedIrrigFiltered}"</span>
                            </div>
                        )}
                    </div>
                )}
                {stats.totalSpend > 0 && (
                    <div className="bg-white rounded-xl px-4 py-3 shadow-md mb-4 flex items-center justify-between border-l-4 border-emerald-500">
                        <div><div className="text-xs font-semibold text-gray-400 uppercase tracking-widest">Season Spend</div><div className="text-xl font-extrabold text-gray-800">${stats.totalSpend.toFixed(2)}</div></div>
                        <div className="text-right text-xs text-gray-400"><div>{filtered.filter(a => a.cost > 0).length} logged costs</div><div className="font-semibold text-gray-600">${(stats.totalSpend / (filtered.filter(a => a.cost > 0).length || 1)).toFixed(2)} avg</div></div>
                    </div>
                )}
                {!stats.totalSpend && (
                    <div className="mb-4 px-3 py-2 bg-gray-50 rounded-xl border border-dashed border-gray-200 text-xs text-gray-400 text-center">Add a <span className="font-semibold">Cost</span> when logging activities to track season spend</div>
                )}
                <div className="bg-white rounded-xl p-4 shadow-md mb-4">
                    <h3 className="text-lg font-bold mb-3">Activity Breakdown</h3>
                    <div className="space-y-2">
                        {breakdownItems.map(({ type, label, count }) => {
                            const color = (ACTIVITY_COLORS[type] || ACTIVITY_COLORS.mowing).hex;
                            return (
                                <div key={type} className="flex items-center gap-3">
                                    <div className="w-20 text-xs text-gray-600 font-medium">{label}</div>
                                    <div className="flex-1 bg-gray-100 rounded-full h-7 relative overflow-hidden">
                                        <div className="h-full rounded-full transition-all duration-500" style={{ width: `${(count / maxBreakdown) * 100}%`, backgroundColor: color }} />
                                        <div className="absolute inset-0 flex items-center justify-end pr-2">
                                            <span className="text-xs font-bold" style={{ color: count > 0 ? 'white' : '#9CA3AF' }}>{count}</span>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
                <div className="bg-white rounded-xl p-4 shadow-md mb-4">
                    <h3 className="text-lg font-bold mb-3">Monthly Trend</h3>
                    <div className="flex items-end justify-between gap-1" style={{ height: '100px' }}>
                        {monthlyData.map((data, i) => (
                            <div key={i} className="flex-1 flex flex-col items-center gap-1">
                                <div className="w-full flex items-end justify-center" style={{ height: '80px' }}>
                                    <div className="w-full bg-[#367C2B] rounded-t transition-all duration-500 flex items-end justify-center pb-0.5" style={{ height: `${(data.count / maxMonthly) * 100}%`, minHeight: data.count > 0 ? '20px' : '0' }}>
                                        {data.count > 0 && <span className="text-xs font-bold text-white leading-none">{data.count}</span>}
                                    </div>
                                </div>
                                <div className="text-xs text-gray-500 font-medium">{data.month}</div>
                            </div>
                        ))}
                    </div>
                </div>
                <div className="bg-white rounded-xl p-4 shadow-md">
                    <h3 className="text-lg font-bold mb-3">🕒 Recent Activity</h3>
                    {recent.length > 0 ? recent.map(activity => {
                        const colors = ACTIVITY_COLORS[activity.type] || ACTIVITY_COLORS.mowing;
                        const daysSince = Math.floor((new Date() - new Date(activity.date)) / (1000 * 60 * 60 * 24));
                        const timeAgo = daysSince === 0 ? 'Today' : daysSince === 1 ? 'Yesterday' : `${daysSince} days ago`;
                        return (
                            <div key={activity.id} className={`pb-3 mb-3 border-b last:border-0 cursor-pointer card-hover pl-3 border-l-2 ${colors.border}`} onClick={() => setExpandedRecentId(expandedRecentId === activity.id ? null : activity.id)}>
                                <div className="flex items-center gap-3">
                                    <div className="text-2xl">{ACTIVITY_TYPES[activity.type]?.icon || '📋'}</div>
                                    <div className="flex-1"><div className={`font-semibold ${colors.text}`}>{ACTIVITY_TYPES[activity.type]?.name}</div><div className="text-sm text-gray-500">{timeAgo}</div></div>
                                    <span className="text-gray-400 text-xs">{expandedRecentId === activity.id ? '▲' : '▼'}</span>
                                </div>
                                {expandedRecentId === activity.id && <ActivityDetails activity={activity} />}
                            </div>
                        );
                    }) : (
                        <div className="text-center py-8 text-gray-500"><div className="text-4xl mb-2">📋</div><div className="text-sm">No activities yet</div></div>
                    )}
                </div>
            </div>
        );
    };
})();
</script>

<script type="text/babel">
// ─── MyGarage Component ───────────────────────────────────────────────────────
(function () {
    const { useState } = React;
    window.MyGarage = ({ equipment, activities, onAdd, onDelete, onUpdate, onNavigate }) => {
        const [garageForm, setGarageForm] = useState({ name: '', type: 'mowers', selectedProduct: '', customName: '', mowerType: '' });
        const allProducts = PRODUCT_DATABASE[garageForm.type] || [];
        const currentProducts = (garageForm.type === 'mowers' && garageForm.mowerType)
            ? allProducts.filter(p => p.mowerCategory === garageForm.mowerType || p.id.includes('-other'))
            : allProducts;
        const selectedProductData = currentProducts.find(p => p.id === garageForm.selectedProduct);
        const handleTypeChange = (newType) => setGarageForm({ name: '', type: newType, selectedProduct: '', customName: '', mowerType: '' });
        const handleProductSelect = (productId) => {
            const product = currentProducts.find(p => p.id === productId);
            if (product && !product.id.includes('-other')) {
                setGarageForm({ ...garageForm, selectedProduct: productId, name: product.name, customName: '' });
            } else {
                setGarageForm({ ...garageForm, selectedProduct: productId, name: '', customName: '' });
            }
        };
        const handleSubmit = (e) => {
            e.preventDefault();
            const finalName = garageForm.selectedProduct && !garageForm.selectedProduct.includes('-other') ? garageForm.name : garageForm.customName;
            if (finalName) {
                const productInfo = selectedProductData || {};
                onAdd({ name: finalName, type: garageForm.type, brand: productInfo.brand || 'Custom', details: productInfo.features || productInfo.type || '', deck: productInfo.deck || '', maintenanceSchedule: productInfo.maintenanceSchedule || null });
                setGarageForm({ name: '', type: garageForm.type, selectedProduct: '', customName: '', mowerType: '' });
            }
        };
        const typeLabels = { mowers: 'Mower', spreaders: 'Spreader', trimmers: 'Trimmer' };
        return (
            <div>
                <div className="flex items-center justify-between mb-4">
                    <h2 className="text-xl font-bold">🏠 My Garage</h2>
                    <button onClick={() => onNavigate('products')} className="px-3 py-1 text-xs font-semibold text-[#367C2B] border border-[#367C2B] rounded-lg hover:bg-[#367C2B]/10">📖 Product Guide</button>
                </div>
                <div className="bg-white rounded-lg shadow-md p-4 mb-4">
                    <h3 className="font-bold mb-4">Add Equipment</h3>
                    <form onSubmit={handleSubmit}>
                        <div className="mb-4">
                            <label className="block text-sm font-semibold mb-2">Equipment Type</label>
                            <div className="grid grid-cols-3 gap-2">
                                {Object.entries(typeLabels).map(([key, label]) => (
                                    <button key={key} type="button" onClick={() => handleTypeChange(key)} className={`p-3 rounded-lg text-center transition btn-press ${garageForm.type === key ? 'bg-[#367C2B]/10 text-[#367C2B] border-2 border-[#367C2B]' : 'bg-white text-gray-700 border-2 border-gray-200 hover:border-[#367C2B]'}`}>
                                        <div className="text-xs font-semibold mt-1">{label}</div>
                                    </button>
                                ))}
                            </div>
                        </div>
                        {garageForm.type === 'mowers' && (
                            <div className="mb-4">
                                <label className="block text-sm font-semibold mb-2">Mower Type</label>
                                <div className="grid grid-cols-3 gap-2">
                                    {['Walk Behind', 'Riding', 'Zero Turn'].map(mt => (
                                        <button key={mt} type="button" onClick={() => setGarageForm({ ...garageForm, mowerType: mt, selectedProduct: '', name: '', customName: '' })} className={`p-2 rounded-lg border-2 text-center text-sm font-semibold transition ${garageForm.mowerType === mt ? 'bg-[#367C2B] text-white border-[#367C2B]' : 'bg-white text-gray-700 border-gray-200 hover:border-[#367C2B]'}`}>{mt}</button>
                                    ))}
                                </div>
                            </div>
                        )}
                        <div className="mb-4">
                            <label className="block text-sm font-semibold mb-2">Select {typeLabels[garageForm.type]}</label>
                            <select value={garageForm.selectedProduct} onChange={(e) => handleProductSelect(e.target.value)} className="w-full px-4 py-2 border rounded-lg">
                                <option value="">Choose from {currentProducts.length} models...</option>
                                {currentProducts.map(p => (<option key={p.id} value={p.id}>{p.brand} - {p.name} {p.deck ? `(${p.deck})` : ''} {p.type ? `- ${p.type}` : ''}</option>))}
                            </select>
                        </div>
                        {garageForm.selectedProduct && garageForm.selectedProduct.includes('-other') && (
                            <div className="mb-4">
                                <label className="block text-sm font-semibold mb-2">Custom Name</label>
                                <input type="text" value={garageForm.customName} onChange={(e) => setGarageForm({ ...garageForm, customName: e.target.value })} placeholder="Enter your equipment name" className="w-full px-4 py-2 border rounded-lg" />
                            </div>
                        )}
                        {selectedProductData && !garageForm.selectedProduct.includes('-other') && (
                            <div className="mb-4 p-3 bg-green-50 border border-green-200 rounded-lg">
                                <div className="text-sm font-semibold text-[#367C2B]">{selectedProductData.brand} {selectedProductData.name}</div>
                                {selectedProductData.features && <div className="text-xs text-gray-600 mt-1">{selectedProductData.features}</div>}
                                {selectedProductData.maintenanceSchedule?.note && <div className="text-xs text-gray-500 mt-1 italic">{selectedProductData.maintenanceSchedule.note}</div>}
                            </div>
                        )}
                        <button type="submit" disabled={!garageForm.selectedProduct || (garageForm.selectedProduct.includes('-other') && !garageForm.customName)} className="w-full px-4 py-2 bg-[#367C2B] text-white rounded-lg disabled:opacity-50 disabled:cursor-not-allowed">Add to Garage</button>
                    </form>
                </div>
                <div className="bg-white rounded-lg shadow p-4">
                    <h3 className="font-bold mb-4">Your Equipment ({equipment.length})</h3>
                    {equipment.length === 0 ? (
                        <p className="text-gray-500 text-center py-6">No equipment yet — add your first piece above!</p>
                    ) : (
                        <div className="space-y-3">
                            {equipment.map(item => {
                                const mowingHours = item.type === 'mowers' ? activities.filter(a => a.type === 'mowing' && a.data && a.data.mowerUsed === item.name).reduce((sum, a) => sum + (parseFloat(a.data.duration) || 45) / 60, 0) : 0;
                                const schedule = item.maintenanceSchedule;
                                return (
                                    <div key={item.id} className="bg-gray-50 p-4 rounded-lg">
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <div className="font-bold">{item.name}</div>
                                                {item.brand && item.brand !== 'Custom' && <div className="text-sm text-[#367C2B] font-semibold">{item.brand}</div>}
                                                <div className="text-xs text-gray-500 capitalize">{typeLabels[item.type] || item.type}</div>
                                                {item.details && <div className="text-xs text-gray-500 mt-1">{item.details}</div>}
                                            </div>
                                            <button onClick={() => onDelete(item.id)} className="px-3 py-1 bg-red-100 text-red-700 rounded text-sm">Remove</button>
                                        </div>
                                        {schedule && (
                                            <div className="mt-3 pt-3 border-t border-gray-200">
                                                <div className="text-xs font-bold text-[#367C2B] uppercase mb-2">Maintenance Schedule</div>
                                                {schedule.note ? (
                                                    <div className="text-xs text-gray-500 italic">{schedule.note}</div>
                                                ) : (() => {
                                                    const logs = item.maintenanceLogs || {};
                                                    const logMaintenance = (type) => {
                                                        onUpdate(item.id, {
                                                            maintenanceLogs: { ...logs, [type]: { loggedAt: Date.now(), hoursAtLog: mowingHours } }
                                                        });
                                                    };
                                                    const MaintenanceRow = ({ type, label, interval }) => {
                                                        const lastLog = logs[type];
                                                        const hrsSince = typeof interval === 'number'
                                                            ? Math.round((mowingHours - (lastLog?.hoursAtLog || 0)) * 10) / 10
                                                            : null;
                                                        const isDue = typeof interval === 'number' && hrsSince >= interval;
                                                        const lastDate = lastLog?.loggedAt
                                                            ? new Date(lastLog.loggedAt).toLocaleDateString()
                                                            : null;
                                                        return (
                                                            <div className={`text-xs p-2 rounded-lg flex flex-col gap-1 ${isDue ? 'bg-red-50 border border-red-200' : 'bg-gray-100'}`}>
                                                                <div className="flex items-center justify-between">
                                                                    <span className="font-semibold text-gray-800">{label}</span>
                                                                    {isDue && (
                                                                        <button onClick={() => logMaintenance(type)}
                                                                            className="text-xs font-bold text-white bg-[#367C2B] rounded px-1.5 py-0.5">
                                                                            ✓ Log Done
                                                                        </button>
                                                                    )}
                                                                </div>
                                                                <div className="text-gray-500">
                                                                    {typeof interval === 'number' ? `Every ${interval} hrs` : interval}
                                                                </div>
                                                                {isDue && <div className="text-red-600 font-bold">Due now ({hrsSince} hrs since last)</div>}
                                                                {!isDue && typeof interval === 'number' && hrsSince !== null && (
                                                                    <div className="text-gray-400">{hrsSince} / {interval} hrs</div>
                                                                )}
                                                                {lastDate && <div className="text-gray-400">Last done: {lastDate}</div>}
                                                            </div>
                                                        );
                                                    };
                                                    return (
                                                        <div className="space-y-1.5">
                                                            {item.type === 'mowers' && (
                                                                <div className="text-xs text-gray-600 mb-1.5">Est. hours logged: <span className="font-bold text-[#367C2B]">{Math.round(mowingHours * 10) / 10} hrs</span></div>
                                                            )}
                                                            {schedule.oilChange && <MaintenanceRow type="oilChange" label="Oil Change" interval={schedule.oilChange} />}
                                                            {schedule.airFilter && <MaintenanceRow type="airFilter" label="Air Filter" interval={schedule.airFilter} />}
                                                            {schedule.sparkPlug && <MaintenanceRow type="sparkPlug" label="Spark Plug" interval={schedule.sparkPlug} />}
                                                            {schedule.cleaning && <MaintenanceRow type="cleaning" label="Cleaning" interval={schedule.cleaning} />}
                                                        </div>
                                                    );
                                                })()}
                                    </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            </div>
        );
    };
})();
</script>

<script type="text/babel">
// ─── ProductGuide Component ───────────────────────────────────────────────────
(function () {
    const { useState } = React;
    window.ProductGuide = () => {
        const [category, setCategory] = useState('mowers');
        const [mowerType, setMowerType] = useState('');
        const [brandFilter, setBrandFilter] = useState('');
        const [compareList, setCompareList] = useState([]);
        const [expandedId, setExpandedId] = useState(null);
        const [showCompare, setShowCompare] = useState(false);
        const allProducts = (PRODUCT_DATABASE[category] || []).filter(p => !p.id.includes('-other'));
        const brands = [...new Set(allProducts.map(p => p.brand))].sort();
        let filtered = allProducts;
        if (category === 'mowers' && mowerType) filtered = filtered.filter(p => p.mowerCategory === mowerType);
        if (brandFilter) filtered = filtered.filter(p => p.brand === brandFilter);
        const toggleCompare = (product) => {
            if (compareList.find(p => p.id === product.id)) { setCompareList(compareList.filter(p => p.id !== product.id)); }
            else if (compareList.length < 3) { setCompareList([...compareList, product]); }
        };
        const typeLabels = { mowers: 'Mowers', spreaders: 'Spreaders', trimmers: 'Trimmers', fertilizers: 'Fertilizers', seeds: 'Grass Seed' };
        const typeIcons  = { mowers: '🚜', spreaders: '📡', trimmers: '✂️', fertilizers: '🌾', seeds: '🌱' };
        const renderSpec = (label, value) => {
            if (!value) return null;
            return <div className="flex justify-between text-xs py-1 border-b border-gray-100"><span className="text-gray-500">{label}</span><span className="font-semibold text-gray-800 text-right">{value}</span></div>;
        };
        const ProductCard = ({ product }) => {
            const isExpanded = expandedId === product.id;
            const isCompared = !!compareList.find(p => p.id === product.id);
            return (
                <div className={`bg-white rounded-xl shadow border-2 transition ${isCompared ? 'border-[#367C2B]' : 'border-gray-100'}`}>
                    <div className="p-3 cursor-pointer" onClick={() => setExpandedId(isExpanded ? null : product.id)}>
                        <div className="flex items-start justify-between">
                            <div className="flex-1">
                                <div className="text-sm font-bold text-gray-900">{product.name}</div>
                                <div className="text-xs text-[#367C2B] font-semibold">{product.brand}</div>

                            </div>
                            <div className="flex items-center gap-2">
                                <button onClick={(e) => { e.stopPropagation(); toggleCompare(product); }} disabled={!isCompared && compareList.length >= 3} className={`px-3 py-1.5 rounded-full text-xs font-bold transition-all ${isCompared ? 'bg-[#367C2B] text-white' : compareList.length >= 3 ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-gray-100 text-gray-700 hover:bg-[#367C2B] hover:text-white'}`}>{isCompared ? '✓ Selected' : '+ Compare'}</button>
                                <span className="text-gray-400 text-xs">{isExpanded ? '▲' : '▼'}</span>
                            </div>
                        </div>
                    </div>
                    {isExpanded && (
                        <div className="px-3 pb-3 border-t border-gray-100 pt-2">
                            {renderSpec('Brand', product.brand)}{product.deck && renderSpec('Deck Size', product.deck)}{product.type && renderSpec('Type', product.type)}{product.features && renderSpec('Features', product.features)}{product.npk && renderSpec('NPK', product.npk)}{product.coverage && renderSpec('Coverage', product.coverage)}
                        </div>
                    )}
                </div>
            );
        };
        const SPEC_ROWS = [
            ['Type',     p => p.type || p.mowerCategory],
            ['Deck',     p => p.deck],
            ['Features', p => p.features],
            ['NPK',      p => p.npk],
            ['Coverage', p => p.coverage],
        ];
        return (
            <div>
                {showCompare && compareList.length >= 2 && (
                    <div className="fixed inset-0 z-50 bg-black/50 flex items-end sm:items-center justify-center p-4" onClick={() => setShowCompare(false)}>
                        <div className="bg-white rounded-2xl w-full max-w-2xl max-h-[85vh] overflow-auto shadow-2xl animate-scale-in" onClick={e => e.stopPropagation()}>
                            <div className="flex items-center justify-between px-5 py-4 border-b">
                                <div className="font-bold text-lg text-gray-900">Product Comparison</div>
                                <button onClick={() => setShowCompare(false)} className="text-gray-400 hover:text-gray-700 text-2xl leading-none font-light">×</button>
                            </div>
                            <div className="p-4">
                                <div className="grid gap-3 mb-5" style={{gridTemplateColumns: `repeat(${compareList.length}, 1fr)`}}>
                                    {compareList.map(p => (
                                        <div key={p.id} className="text-center bg-[#e8f5e9] rounded-xl p-3">
                                            <div className="text-sm font-bold text-gray-900 leading-tight">{p.name}</div>
                                            <div className="text-xs text-[#367C2B] font-semibold mt-0.5">{p.brand}</div>
                                        </div>
                                    ))}
                                </div>
                                {SPEC_ROWS.filter(([, getter]) => compareList.some(p => getter(p))).map(([label, getter]) => (
                                    <div key={label} className="mb-3">
                                        <div className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1.5">{label}</div>
                                        <div className="grid gap-2" style={{gridTemplateColumns: `repeat(${compareList.length}, 1fr)`}}>
                                            {compareList.map(p => (
                                                <div key={p.id} className="bg-gray-50 rounded-lg px-2 py-2 text-xs text-gray-700 text-center flex items-center justify-center min-h-[36px]">
                                                    {getter(p) || <span className="text-gray-300">—</span>}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="px-4 pb-4">
                                <button onClick={() => { setShowCompare(false); setCompareList([]); }} className="w-full py-2.5 bg-gray-100 text-gray-600 rounded-xl text-sm font-semibold hover:bg-gray-200">Done — Clear Selection</button>
                            </div>
                        </div>
                    </div>
                )}
                <h2 className="text-xl font-bold mb-4">📖 Product Guide</h2>
                <div className="flex gap-1 bg-gray-100 p-1 rounded-lg mb-4 overflow-x-auto">
                    {Object.entries(typeLabels).map(([key, label]) => (
                        <button key={key} onClick={() => { setCategory(key); setMowerType(''); setBrandFilter(''); setCompareList([]); setExpandedId(null); }} className={`flex-shrink-0 py-2 px-3 rounded-md text-xs font-semibold transition ${category === key ? 'bg-[#367C2B] text-white shadow' : 'text-gray-600 hover:text-gray-900'}`}>{typeIcons[key]} {label}</button>
                    ))}
                </div>
                <div className="bg-white rounded-xl shadow p-3 mb-4">
                    <div className="flex items-center gap-2 flex-wrap">
                        {category === 'mowers' && (
                            <div className="flex gap-1">
                                {['', 'Walk Behind', 'Riding', 'Zero Turn'].map(mt => (
                                    <button key={mt} onClick={() => { setMowerType(mt); setExpandedId(null); }} className={`px-2 py-1 rounded text-xs font-semibold ${mowerType === mt ? 'bg-[#367C2B] text-white' : 'bg-gray-100 text-gray-600'}`}>{mt || 'All'}</button>
                                ))}
                            </div>
                        )}
                        <select value={brandFilter} onChange={(e) => { setBrandFilter(e.target.value); setExpandedId(null); }} className="px-2 py-1 border rounded text-xs">
                            <option value="">All Brands ({brands.length})</option>
                            {brands.map(b => <option key={b} value={b}>{b}</option>)}
                        </select>
                        <span className="text-xs text-gray-400 ml-auto">{filtered.length} products</span>
                    </div>
                </div>
                {compareList.length > 0 && (
                    <div className="fixed bottom-0 left-0 right-0 z-50 bg-white border-t-2 border-[#367C2B] shadow-2xl" style={{animation: 'slideUpBounce 0.35s cubic-bezier(0.34, 1.56, 0.64, 1)'}}>
                        <div className="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
                            <div className="flex-1 min-w-0"><div className="text-xs text-gray-500 font-semibold">{compareList.length}/3 selected</div><div className="text-sm font-bold text-gray-800 truncate">{compareList.map(p => p.name).join(' vs ')}</div></div>
                            <div className="flex items-center gap-2 flex-shrink-0">
                                <button onClick={() => setCompareList([])} className="px-3 py-2 text-xs font-semibold text-gray-500 border border-gray-300 rounded-lg">Clear</button>
                                {compareList.length >= 2 && <button onClick={() => setShowCompare(true)} className="px-5 py-2.5 bg-[#FFDE00] text-[#367C2B] rounded-lg text-sm font-extrabold shadow-lg" style={{animation: 'pulseGlow 2s ease-in-out infinite'}}>Compare Now →</button>}
                            </div>
                        </div>
                    </div>
                )}
                <div className={`space-y-2 ${compareList.length > 0 ? 'pb-20' : ''}`}>
                    {filtered.map(product => <ProductCard key={product.id} product={product} />)}
                </div>
                {filtered.length === 0 && <div className="bg-white rounded-xl shadow p-8 text-center text-gray-500">No products match the current filters</div>}
            </div>
        );
    };
})();
</script>

<script type="text/babel">
// ─── SchedulesView Component ──────────────────────────────────────────────────
(function () {
    const { useState, useMemo } = React;

    const FREQ_OPTIONS = [
        { label: 'Every 3 days',   days: 3   },
        { label: 'Weekly',         days: 7   },
        { label: 'Every 2 weeks',  days: 14  },
        { label: 'Monthly',        days: 30  },
        { label: 'Every 6 weeks',  days: 42  },
        { label: 'Every 3 months', days: 90  },
        { label: 'Yearly',         days: 365 },
    ];

    const TYPE_META = {
        mowing:      { label: 'Mowing',      icon: '🚜' },
        fertilizer:  { label: 'Fertilizer',  icon: '🌾' },
        watering:    { label: 'Watering',     icon: '💧' },
        seeding:     { label: 'Seeding',      icon: '🌱' },
        aeration:    { label: 'Aeration',     icon: '🔧' },
        trimming:    { label: 'Trimming',     icon: '&#9986;' },
        treatment:   { label: 'Treatment',    icon: '🧪' },
        maintenance: { label: 'Maintenance',  icon: '🛠️' },
    };

    const nextDueDate = (sched) => {
        const ref = new Date(sched.lastDone || sched.createdAt);
        ref.setHours(0, 0, 0, 0);
        const d = new Date(ref);
        d.setDate(d.getDate() + sched.frequencyDays);
        return d;
    };

    const daysUntil = (sched) => {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        return Math.ceil((nextDueDate(sched) - today) / (1000 * 60 * 60 * 24));
    };

    const BLANK_FORM = { name: '', type: 'mowing', frequencyDays: 7 };

    // Sub-components defined at IIFE level so they get stable references
    const DueChip = ({ sched }) => {
        const d = daysUntil(sched);
        if (d < 0)   return <span className="text-xs font-bold text-red-600 bg-red-50 px-2 py-0.5 rounded-full">{Math.abs(d)}d overdue</span>;
        if (d === 0) return <span className="text-xs font-bold text-orange-600 bg-orange-50 px-2 py-0.5 rounded-full">Due today</span>;
        return <span className="text-xs font-semibold text-gray-400">in {d}d</span>;
    };

    const ScheduleRow = ({ sched, onLog, onDelete }) => {
        const meta       = TYPE_META[sched.type] || { label: sched.type, icon: '📋' };
        const color      = ACTIVITY_COLORS[sched.type] || ACTIVITY_COLORS.mowing;
        const d          = daysUntil(sched);
        const freq       = FREQ_OPTIONS.find(f => f.days === sched.frequencyDays);
        const freqLabel  = freq ? freq.label : ('Every ' + sched.frequencyDays + ' days');
        const nextDue    = nextDueDate(sched);
        const nextDueStr = nextDue.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        return (
            <div className={'bg-white rounded-xl shadow-sm border-l-4 ' + (d <= 0 ? 'border-red-400' : color.border) + ' p-3 flex items-center gap-3'}>
                <div className="text-xl flex-shrink-0">{meta.icon}</div>
                <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap">
                        <span className="font-semibold text-gray-900 text-sm">{sched.name}</span>
                        <DueChip sched={sched} />
                    </div>
                    <div className="text-xs text-gray-400 mt-0.5">
                        {freqLabel} &nbsp;&middot;&nbsp; due {nextDueStr}
                        {sched.lastDone && <span> &nbsp;&middot;&nbsp; last done {new Date(sched.lastDone).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</span>}
                    </div>
                </div>
                <div className="flex items-center gap-2 flex-shrink-0">
                    <button onClick={() => onLog(sched)} className="px-3 py-1.5 bg-[#367C2B] text-white rounded-lg text-xs font-bold btn-press">Log It</button>
                    <button onClick={() => onDelete(sched.id)} className="text-gray-300 hover:text-red-400 text-lg font-bold leading-none btn-press" aria-label="Delete">&#215;</button>
                </div>
            </div>
        );
    };

    const Section = ({ title, items, onLog, onDelete, emptyMsg }) => {
        if (items.length === 0 && !emptyMsg) return null;
        return (
            <div className="mb-4">
                <div className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">{title}</div>
                {items.length === 0
                    ? <p className="text-xs text-gray-400 italic pl-1">{emptyMsg}</p>
                    : <div className="space-y-2">{items.map(function(s) { return <ScheduleRow key={s.id} sched={s} onLog={onLog} onDelete={onDelete} />; })}</div>
                }
            </div>
        );
    };

    window.SchedulesView = ({ schedules, onAdd, onDelete, onLog }) => {
        const [showForm, setShowForm]     = useState(false);
        const [form, setForm]             = useState(BLANK_FORM);
        const [customDays, setCustomDays] = useState('');
        const [useCustom, setUseCustom]   = useState(false);

        const sorted = useMemo(function() {
            return [...schedules].sort(function(a, b) { return daysUntil(a) - daysUntil(b); });
        }, [schedules]);

        const overdue  = sorted.filter(function(s) { return daysUntil(s) < 0; });
        const dueToday = sorted.filter(function(s) { return daysUntil(s) === 0; });
        const upcoming = sorted.filter(function(s) { return daysUntil(s) > 0 && daysUntil(s) <= 14; });
        const later    = sorted.filter(function(s) { return daysUntil(s) > 14; });

        const handleAdd = () => {
            const days = useCustom ? parseInt(customDays, 10) : form.frequencyDays;
            if (!form.name.trim() || !days || days < 1) return;
            onAdd({ name: form.name.trim(), type: form.type, frequencyDays: days });
            setForm(BLANK_FORM);
            setCustomDays('');
            setUseCustom(false);
            setShowForm(false);
        };

        const allDue   = overdue.length + dueToday.length;
        const noUrgent = overdue.length === 0 && dueToday.length === 0 && upcoming.length === 0;

        return (
            <div className="animate-fade-in">
                <div className="flex items-center justify-between mb-4">
                    <h2 className="text-2xl font-bold">&#128467; My Tasks</h2>
                    <button onClick={() => setShowForm(v => !v)} className="px-4 py-2 bg-[#367C2B] text-white rounded-lg text-sm font-bold btn-press">
                        {showForm ? 'Cancel' : '+ Add'}
                    </button>
                </div>

                {showForm && (
                    <div className="bg-white rounded-2xl shadow-md border border-gray-100 p-4 mb-5">
                        <div className="space-y-3">
                            <div>
                                <label className="block text-xs font-semibold text-gray-500 mb-1">Task name</label>
                                <input
                                    type="text"
                                    value={form.name}
                                    onChange={e => setForm(f => ({ ...f, name: e.target.value }))}
                                    placeholder="e.g. Weekly Mow, Front Lawn Fertilizer"
                                    className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#367C2B]/30"
                                />
                            </div>
                            <div>
                                <label className="block text-xs font-semibold text-gray-500 mb-1">Activity type</label>
                                <div className="flex flex-wrap gap-2">
                                    {Object.entries(TYPE_META).map(([key, meta]) => (
                                        <button key={key} onClick={() => setForm(f => ({ ...f, type: key }))}
                                            className={'px-3 py-1.5 rounded-full text-xs font-semibold border transition ' + (form.type === key ? 'bg-[#367C2B] text-white border-[#367C2B]' : 'bg-gray-50 text-gray-600 border-gray-200')}>
                                            {meta.icon} {meta.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div>
                                <label className="block text-xs font-semibold text-gray-500 mb-1">Repeat every</label>
                                <div className="flex flex-wrap gap-2 mb-2">
                                    {FREQ_OPTIONS.map(opt => (
                                        <button key={opt.days} onClick={() => { setUseCustom(false); setForm(f => ({ ...f, frequencyDays: opt.days })); }}
                                            className={'px-3 py-1.5 rounded-full text-xs font-semibold border transition ' + (!useCustom && form.frequencyDays === opt.days ? 'bg-[#367C2B] text-white border-[#367C2B]' : 'bg-gray-50 text-gray-600 border-gray-200')}>
                                            {opt.label}
                                        </button>
                                    ))}
                                    <button onClick={() => setUseCustom(true)}
                                        className={'px-3 py-1.5 rounded-full text-xs font-semibold border transition ' + (useCustom ? 'bg-[#367C2B] text-white border-[#367C2B]' : 'bg-gray-50 text-gray-600 border-gray-200')}>
                                        Custom
                                    </button>
                                </div>
                                {useCustom && (
                                    <div className="flex items-center gap-2">
                                        <input type="number" min="1" max="999" value={customDays} onChange={e => setCustomDays(e.target.value)} placeholder="days"
                                            className="w-24 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#367C2B]/30" />
                                        <span className="text-sm text-gray-500">days</span>
                                    </div>
                                )}
                            </div>
                            <button onClick={handleAdd}
                                disabled={!form.name.trim() || (useCustom && (!customDays || parseInt(customDays) < 1))}
                                className="w-full py-2.5 bg-[#367C2B] text-white rounded-xl font-bold text-sm btn-press disabled:opacity-40 disabled:cursor-not-allowed">
                                Save Schedule
                            </button>
                        </div>
                    </div>
                )}

                {schedules.length === 0 && !showForm && (
                    <div className="bg-white rounded-2xl shadow-sm border border-dashed border-gray-200 p-8 text-center">
                        <div className="text-4xl mb-3">&#128467;</div>
                        <div className="font-semibold text-gray-700 mb-1">No schedules yet</div>
                        <div className="text-sm text-gray-400 mb-4">Create recurring tasks to track when things are due — mowing, fertilizing, aerating, and more.</div>
                        <button onClick={() => setShowForm(true)} className="px-5 py-2 bg-[#367C2B] text-white rounded-xl text-sm font-bold btn-press">Add Your First Schedule</button>
                    </div>
                )}

                {schedules.length > 0 && (
                    <div>
                        <Section title="Overdue" items={overdue} onLog={onLog} onDelete={onDelete} />
                        <Section title="Due Today" items={dueToday} onLog={onLog} onDelete={onDelete} />
                        <Section title="Coming Up — Next 2 Weeks" items={upcoming} onLog={onLog} onDelete={onDelete} />
                        <Section title="Later" items={later} onLog={onLog} onDelete={onDelete} emptyMsg={noUrgent ? 'All tasks are up to date.' : null} />
                    </div>
                )}
            </div>
        );
    };
})();
</script>

<script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ─── Component aliases (defined in inline text/babel blocks above) ──────────
    const ActivityDetails     = window.ActivityDetails;
    const HistoryView         = window.HistoryView;
    const Dashboard           = window.Dashboard;
    const MyGarage            = window.MyGarage;
    const ProductGuide        = window.ProductGuide;
    const ResearchSourcesPage = window.ResearchSourcesPage;
    const SchedulesView       = window.SchedulesView;

    // ─── Firebase Data Layer ────────────────────────────────────────────────────
    // Wraps all reads/writes so the rest of the app doesn't care whether
    // data lives in localStorage or Firestore.

    const useDataStore = (currentUser) => {
        const fb = window.__FIREBASE__ || {};
        const isCloud = fb.configured && !!currentUser;

        // ── READ ──────────────────────────────────────────────────────────────
        const loadAll = useCallback(async () => {
            if (!isCloud) {
                return {
                    activities: JSON.parse(localStorage.getItem('lawnCareActivities') || '[]'),
                    equipment:  JSON.parse(localStorage.getItem('lawnCareEquipment')  || '[]'),
                    profile:    JSON.parse(localStorage.getItem('lawnProfile')         || 'null'),
                };
            }
            const uid = currentUser.uid;
            const { db, collection, getDocs, doc, getDoc } = fb;
            try {
                const [actSnap, eqSnap, profSnap] = await Promise.all([
                    getDocs(collection(db, 'users', uid, 'activities')),
                    getDocs(collection(db, 'users', uid, 'equipment')),
                    getDoc(doc(db, 'users', uid, 'profile', 'data')),
                ]);
                return {
                    activities: actSnap.docs.map(d => ({ id: d.id, ...d.data() })),
                    equipment:  eqSnap.docs.map(d => ({ id: d.id, ...d.data() })),
                    profile:    profSnap.exists() ? profSnap.data() : null,
                };
            } catch (e) {
                console.error('Firestore loadAll failed:', e);
                return { activities: [], equipment: [], profile: null };
            }
        }, [isCloud, currentUser]);

        // ── WRITE activities ──────────────────────────────────────────────────
        const saveActivity = useCallback(async (activity) => {
            if (!isCloud) {
                // Strip photo fields — photos require a signed-in account and Firebase Storage
                const { photoUrl: _photoUrl, ...localActivity } = activity;
                const stored = JSON.parse(localStorage.getItem('lawnCareActivities') || '[]');
                const updated = [...stored, localActivity];
                localStorage.setItem('lawnCareActivities', JSON.stringify(updated));
                return localActivity;
            }
            const { db, collection, addDoc, serverTimestamp } = fb;
            const ref = await addDoc(
                collection(db, 'users', currentUser.uid, 'activities'),
                { ...activity, createdAt: serverTimestamp() }
            );
            return { ...activity, id: ref.id };
        }, [isCloud, currentUser]);

        const deleteActivity = useCallback(async (id) => {
            if (!isCloud) {
                const stored = JSON.parse(localStorage.getItem('lawnCareActivities') || '[]');
                localStorage.setItem('lawnCareActivities', JSON.stringify(stored.filter(a => a.id !== id)));
                return;
            }
            const { db, doc, deleteDoc } = fb;
            await deleteDoc(doc(db, 'users', currentUser.uid, 'activities', String(id)));
        }, [isCloud, currentUser]);

        // ── WRITE equipment ───────────────────────────────────────────────────
        const saveEquipment = useCallback(async (item) => {
            if (!isCloud) {
                const stored = JSON.parse(localStorage.getItem('lawnCareEquipment') || '[]');
                const updated = [...stored, item];
                localStorage.setItem('lawnCareEquipment', JSON.stringify(updated));
                return item;
            }
            const { db, collection, addDoc, serverTimestamp } = fb;
            const ref = await addDoc(
                collection(db, 'users', currentUser.uid, 'equipment'),
                { ...item, createdAt: serverTimestamp() }
            );
            return { ...item, id: ref.id };
        }, [isCloud, currentUser]);

        const deleteEquipment = useCallback(async (id) => {
            if (!isCloud) {
                const stored = JSON.parse(localStorage.getItem('lawnCareEquipment') || '[]');
                localStorage.setItem('lawnCareEquipment', JSON.stringify(stored.filter(e => e.id !== id)));
                return;
            }
            const { db, doc, deleteDoc } = fb;
            await deleteDoc(doc(db, 'users', currentUser.uid, 'equipment', String(id)));
        }, [isCloud, currentUser]);

        // ── UPDATE equipment (for maintenance logging) ────────────────────────
        const updateEquipment = useCallback(async (id, updates) => {
            if (!isCloud) {
                const stored = JSON.parse(localStorage.getItem('lawnCareEquipment') || '[]');
                localStorage.setItem('lawnCareEquipment', JSON.stringify(
                    stored.map(e => e.id === id ? { ...e, ...updates } : e)
                ));
                return;
            }
            const { db, doc, setDoc } = fb;
            await setDoc(doc(db, 'users', currentUser.uid, 'equipment', String(id)), updates, { merge: true });
        }, [isCloud, currentUser]);

        // ── WRITE profile ─────────────────────────────────────────────────────
        const saveProfile = useCallback(async (profile) => {
            localStorage.setItem('lawnProfile', JSON.stringify(profile)); // always cache locally
            if (!isCloud) return;
            const { db, doc, setDoc } = fb;
            await setDoc(doc(db, 'users', currentUser.uid, 'profile', 'data'), profile);
        }, [isCloud, currentUser]);

        return { loadAll, saveActivity, deleteActivity, saveEquipment, deleteEquipment, updateEquipment, saveProfile, isCloud };
    };

    // ─── Auth Modal ─────────────────────────────────────────────────────────────
    const AuthModal = ({ onClose, onSuccess }) => {
        const [mode, setMode] = useState('signin'); // 'signin' | 'signup'
        const [email, setEmail] = useState('');
        const [password, setPassword] = useState('');
        const [error, setError] = useState('');
        const [loading, setLoading] = useState(false);
        const fb = window.__FIREBASE__;

        const handleGoogle = async () => {
            if (!fb.configured) return;
            setLoading(true); setError('');
            try {
                const provider = new fb.GoogleAuthProvider();
                const result = await fb.signInWithPopup(fb.auth, provider);
                onSuccess(result.user);
            } catch(e) {
                setError(e.message);
            } finally { setLoading(false); }
        };

        const handleEmail = async (e) => {
            e.preventDefault();
            if (!fb.configured) return;
            setLoading(true); setError('');
            try {
                let result;
                if (mode === 'signin') {
                    result = await fb.signInWithEmailAndPassword(fb.auth, email, password);
                } else {
                    result = await fb.createUserWithEmailAndPassword(fb.auth, email, password);
                }
                onSuccess(result.user);
            } catch(e) {
                const msg = e.code === 'auth/wrong-password'    ? 'Incorrect password.'
                          : e.code === 'auth/user-not-found'    ? 'No account with that email.'
                          : e.code === 'auth/email-already-in-use' ? 'Email already in use. Try signing in.'
                          : e.code === 'auth/weak-password'     ? 'Password must be at least 6 characters.'
                          : e.message;
                setError(msg);
            } finally { setLoading(false); }
        };

        return (
            <div className="auth-modal-bg" onClick={onClose}>
                <div className="auth-modal" onClick={e => e.stopPropagation()}>
                    {/* Logo */}
                    <div className="text-center mb-6">
                        <img src="yardstick-logo-light.svg" alt="Yardstick logo" className="h-14 w-14 mx-auto mb-2" />
                        <div className="text-xl font-extrabold text-gray-900">Yardstick</div>
                        <div className="text-sm text-gray-500 mt-1">
                            {mode === 'signin' ? 'Sign in to sync your lawn data across devices' : 'Create a free account to save your data to the cloud'}
                        </div>
                    </div>

                    {/* Google button */}
                    <button
                        onClick={handleGoogle}
                        disabled={loading}
                        className="w-full flex items-center justify-center gap-3 py-3 px-4 border-2 border-gray-200 rounded-xl font-semibold text-gray-700 hover:border-gray-400 hover:bg-gray-50 transition mb-4 disabled:opacity-50"
                    >
                        <svg width="20" height="20" viewBox="0 0 48 48">
                            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                        </svg>
                        Continue with Google
                    </button>

                    <div className="flex items-center gap-3 mb-4">
                        <div className="flex-1 h-px bg-gray-200"></div>
                        <span className="text-xs text-gray-400 font-semibold">OR</span>
                        <div className="flex-1 h-px bg-gray-200"></div>
                    </div>

                    {/* Email/password form */}
                    <form onSubmit={handleEmail} className="space-y-3">
                        <input
                            type="email" required placeholder="Email address"
                            value={email} onChange={e => setEmail(e.target.value)}
                            className="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-[#367C2B] focus:outline-none"
                        />
                        <input
                            type="password" required placeholder="Password (min. 6 characters)"
                            value={password} onChange={e => setPassword(e.target.value)}
                            className="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-[#367C2B] focus:outline-none"
                        />
                        {error && <div className="text-xs text-red-600 font-medium">{error}</div>}
                        <button
                            type="submit" disabled={loading}
                            className="w-full py-3 bg-[#367C2B] text-white rounded-xl font-bold text-sm disabled:opacity-50"
                        >
                            {loading ? '...' : mode === 'signin' ? 'Sign In' : 'Create Account'}
                        </button>
                    </form>

                    <div className="text-center mt-4">
                        <button
                            onClick={() => { setMode(mode === 'signin' ? 'signup' : 'signin'); setError(''); }}
                            className="text-sm text-[#367C2B] font-semibold"
                        >
                            {mode === 'signin' ? "Don't have an account? Sign up free" : 'Already have an account? Sign in'}
                        </button>
                    </div>

                    <button onClick={onClose} className="w-full mt-3 py-2 text-xs text-gray-400 hover:text-gray-600">
                        Continue without an account →
                    </button>
                </div>
            </div>
        );
    };

    // ─── Sync Status Banner ─────────────────────────────────────────────────────
    const SyncBanner = ({ isCloud, currentUser, userName, onSignOut, firebaseConfigured }) => {
        if (!firebaseConfigured) return null; // Hide if Firebase not set up yet

        if (isCloud && currentUser) {
            const name = userName || currentUser.displayName || currentUser.email || 'Account';
            return (
                <div className="bg-[#e8f5e9] border-b border-[#367C2B]/20 px-4 py-2">
                    <div className="max-w-5xl mx-auto flex items-center justify-between">
                        <div className="flex items-center gap-2">
                            <span className="cloud-badge">☁️ Cloud Sync On</span>
                            <span className="text-xs text-gray-600 truncate max-w-[140px]">{name}</span>
                        </div>
                        <button onClick={onSignOut} className="text-xs font-semibold text-gray-500 hover:text-gray-700 underline">
                            Sign Out
                        </button>
                    </div>
                </div>
            );
        }

        return null;
    };

    // ─── Citation Badge ─────────────────────────────────────────────────────────
    const CitationBadge = ({ sources, label }) => {
        const [open, setOpen] = useState(false);
        if (!sources || sources.length === 0) return null;
        return (
            <span style={{position: 'relative', display: 'inline-block', verticalAlign: 'middle'}}>
                <button
                    className="cite-btn"
                    onClick={(e) => { e.preventDefault(); e.stopPropagation(); setOpen(!open); }}
                    aria-label={`Sources for ${label || 'this claim'}`}
                >i</button>
                {open && (
                    <React.Fragment>
                        <div className="cite-overlay" onClick={(e) => { e.preventDefault(); e.stopPropagation(); setOpen(false); }} />
                        <div className="cite-popup" style={{position: 'fixed', top: '50%', left: '50%', transform: 'translate(-50%, -50%)'}}>
                            <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8}}>
                                <div style={{fontSize: 11, fontWeight: 700, color: '#367C2B', textTransform: 'uppercase', letterSpacing: '0.5px'}}>
                                    {label ? `Source: ${label}` : 'Sources'}
                                </div>
                                <button onClick={(e) => { e.stopPropagation(); setOpen(false); }} style={{background: 'none', border: 'none', fontSize: 18, cursor: 'pointer', color: '#999', padding: '0 0 0 8px', lineHeight: 1}}>×</button>
                            </div>
                            {sources.map((s, i) => (
                                <div key={i} style={{marginBottom: i < sources.length - 1 ? 8 : 0}}>
                                    {s.url ? (
