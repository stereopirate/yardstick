<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E4D18"/>
      <stop offset="55%" stop-color="#2D6627"/>
      <stop offset="100%" stop-color="#367C2B"/>
    </linearGradient>
    <!-- Subtle texture overlay -->
    <linearGradient id="overlayGrad" x1="0" y1="0" x2="0" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.18"/>
    </linearGradient>
    <!-- Yellow glow for accent -->
    <radialGradient id="yellowGlow" cx="920" cy="180" r="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5C842" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#F5C842" stop-opacity="0"/>
    </radialGradient>
    <!-- Blade mask -->
    <clipPath id="cardClip">
      <rect x="0" y="0" width="1200" height="630" rx="0"/>
    </clipPath>
  </defs>

  <g clip-path="url(#cardClip)">
    <!-- Background -->
    <rect width="1200" height="630" fill="url(#bgGrad)"/>
    <rect width="1200" height="630" fill="url(#overlayGrad)"/>
    <rect width="1200" height="630" fill="url(#yellowGlow)"/>

